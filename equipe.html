<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Equipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .eq-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    .eq-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0 16px; border-bottom:1px solid var(--borda); margin-bottom:20px;
    }
    .eq-header h1 { font-size:18px; font-weight:700; }

    .eq-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:14px; margin-bottom:10px; transition:all .2s;
    }
    .eq-card:hover { border-color:var(--borda-hover); }
    .eq-card.inactive { opacity:0.5; }
    .eq-top { display:flex; justify-content:space-between; align-items:center; }
    .eq-name { font-size:14px; font-weight:700; }
    .eq-meta { font-size:12px; color:var(--texto-muted); margin-top:2px; }
    .eq-avatar {
      width:40px; height:40px; border-radius:50%;
      background:var(--verde-medio); display:flex; align-items:center;
      justify-content:center; font-size:18px; font-weight:800; color:#fff;
    }
    .eq-actions { display:flex; gap:6px; margin-top:10px; }
    .eq-btn {
      padding:7px 14px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:11px;
      font-weight:600; font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .eq-btn:hover { border-color:var(--verde-acao); color:var(--verde-acao); }
    .eq-btn.danger:hover { border-color:#e74c3c; color:#e74c3c; }
    .eq-btn.toggle-active { color:var(--verde-acao); border-color:rgba(212,168,83,0.3); }
    .eq-btn.toggle-inactive { color:#f39c12; border-color:rgba(243,156,18,0.3); }

    .eq-badge {
      font-size:9px; font-weight:700; padding:3px 8px; border-radius:12px;
      text-transform:uppercase; letter-spacing:0.5px;
    }
    .badge-active { background:rgba(212,168,83,0.15); color:#d4a853; }
    .badge-inactive { background:rgba(243,156,18,0.15); color:#f39c12; }

    /* Modal */
    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0; z-index:1000;
      background:rgba(0,0,0,0.7); display:none; align-items:center;
      justify-content:center; padding:16px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--cinza-escuro); border:1px solid var(--borda);
      border-radius:12px; width:100%; max-width:400px;
      padding:24px 20px; animation:fadeUp 0.3s ease;
    }
    .modal-title {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px;
    }
    .modal-title h2 { font-size:16px; }
    .modal-close {
      background:none; border:none; color:var(--texto-muted); font-size:18px;
      cursor:pointer; padding:4px 8px;
    }

    .empty-eq {
      text-align:center; padding:40px 20px; color:var(--texto-muted);
    }

    /* Bottom nav */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--cinza-escuro); border-top:1px solid var(--borda);
      display:flex; justify-content:center; gap:0; padding:8px 0;
      padding-bottom:max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex:1; max-width:100px; display:flex; flex-direction:column;
      align-items:center; gap:2px; padding:6px 0;
      color:var(--texto-muted); font-size:10px; font-weight:600;
      text-decoration:none; cursor:pointer; border:none; background:none;
      font-family:inherit; transition:all .2s;
    }
    .nav-item.active { color:var(--verde-acao); }
    .nav-item .nav-icon { font-size:18px; }

    body { padding-bottom:70px; }
  </style>
</head>
<body>

<div class="eq-container">

  <div class="eq-header">
    <h1>Equipe</h1>
    <button class="btn btn-primary" onclick="abrirModal()" style="width:auto;padding:8px 16px;font-size:12px;">+ NOVO</button>
  </div>

  <div id="eq-msg" class="msg"></div>
  <div id="eq-list"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-eq">
  <div class="modal">
    <div class="modal-title">
      <h2 id="modal-eq-title">Novo Profissional</h2>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div id="modal-eq-msg" class="msg"></div>
    <input type="hidden" id="eq-edit-id">
    <div class="field">
      <label>NOME *</label>
      <input type="text" id="eq-nome" placeholder="Ex: João, Maria">
    </div>
    <div class="field">
      <label>COMISSÃO (%)</label>
      <input type="number" id="eq-comissao" min="0" max="100" step="1" placeholder="0" value="0">
      <div style="font-size:10px;color:var(--texto-muted);margin-top:4px;">Percentual sobre cada atendimento</div>
    </div>
    <button class="btn btn-primary" onclick="salvar()" id="btn-eq-save">
      <span class="btn-label">SALVAR</span>
      <div class="spinner" style="display:none;"></div>
    </button>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <span class="nav-icon">📅</span>AGENDA
  </a>
  <a class="nav-item" href="servicos.html">
    <span class="nav-icon">✂️</span>SERVIÇOS
  </a>
  <a class="nav-item active" href="equipe.html">
    <span class="nav-icon">👥</span>EQUIPE
  </a>
  <a class="nav-item" href="financeiro.html">
    <span class="nav-icon">💰</span>CAIXA
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js?v=3"></script>
<script src="js/utils.js?v=3"></script>
<script>
console.log('Equipe v1 carregado');

// ── Estado ────────────────────────────────────────────────────
let shop = null;
let barbers = [];

const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzeWRwcnJjeXJqanhkbXpycXB6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzc0MjIxNiwiZXhwIjoyMDg5MzE4MjE2fQ.q_0QPcoipD57qSH-SU7pbS7DELXiOeI9mHq85qvAncs';
const SB_REST = 'https://jsydprrcyrjjxdmzrqpz.supabase.co/rest/v1';
const REST_HEADERS = {
  'apikey': SERVICE_KEY,
  'Authorization': 'Bearer ' + SERVICE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

const ADMIN_EMAILS = ['duam-rt@hotmail.com'];
const _params = new URLSearchParams(window.location.search);
const adminViewingShop = _params.get('shop') || sessionStorage.getItem('admin_viewing_shop');
if (adminViewingShop) sessionStorage.setItem('admin_viewing_shop', adminViewingShop);
const isAdminViewing = !!adminViewingShop;
const db = isAdminViewing
  ? window.supabase.createClient('https://jsydprrcyrjjxdmzrqpz.supabase.co', SERVICE_KEY)
  : sb;

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  if (ADMIN_EMAILS.includes(session.user.email) && !isAdminViewing) {
    window.location.href = 'admin.html';
    return;
  }

  let shopData;
  if (isAdminViewing) {
    const { data } = await db.from('barbershops').select('*').eq('id', adminViewingShop).single();
    shopData = data;
  } else {
    const { data } = await db.from('barbershops').select('*').eq('owner_id', session.user.id).maybeSingle();
    shopData = data;
  }

  if (!shopData) { window.location.href = isAdminViewing ? 'admin.html' : 'onboarding.html'; return; }
  shop = shopData;

  // Banner admin
  if (isAdminViewing) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;';
    banner.innerHTML = `<span style="font-size:11px;color:#e74c3c;font-weight:700;">ADMIN · ${esc(shop.name)}</span>
      <button onclick="sessionStorage.removeItem('admin_viewing_shop');location.href='admin.html'" style="background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">VOLTAR</button>`;
    document.querySelector('.eq-container').insertBefore(banner, document.querySelector('.eq-header'));
  }

  await loadBarbers();
});

async function loadBarbers() {
  const r = await fetch(SB_REST + '/barbers?barbershop_id=eq.' + shop.id + '&order=active.desc,name.asc', {
    headers: REST_HEADERS
  });
  barbers = r.ok ? await r.json() : [];
  renderBarbers();
}

// ── Renderizar ────────────────────────────────────────────────
function renderBarbers() {
  const el = document.getElementById('eq-list');

  if (!barbers.length) {
    el.innerHTML = '<div class="empty-eq"><div style="font-size:40px;margin-bottom:12px;">👥</div><div>Nenhum profissional cadastrado.</div></div>';
    return;
  }

  el.innerHTML = barbers.map(b => {
    const badgeCls = b.active ? 'badge-active' : 'badge-inactive';
    const badgeLabel = b.active ? 'ATIVO' : 'INATIVO';
    const cardCls = b.active ? '' : 'inactive';
    const toggleLabel = b.active ? 'Desativar' : 'Ativar';
    const toggleCls = b.active ? 'toggle-inactive' : 'toggle-active';
    const inicial = b.name.charAt(0).toUpperCase();
    const comissao = b.commission_pct ? b.commission_pct + '% comissão' : 'Sem comissão';

    return `<div class="eq-card ${cardCls}">
      <div class="eq-top">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="eq-avatar">${inicial}</div>
          <div>
            <div class="eq-name">${esc(b.name)}</div>
            <div class="eq-meta">${comissao} · <span class="eq-badge ${badgeCls}">${badgeLabel}</span></div>
          </div>
        </div>
      </div>
      <div class="eq-actions">
        <button class="eq-btn" onclick="editar('${b.id}')">Editar</button>
        <button class="eq-btn ${toggleCls}" onclick="toggle('${b.id}', ${!b.active})">${toggleLabel}</button>
        <button class="eq-btn danger" onclick="excluir('${b.id}', '${esc(b.name)}', this)">Excluir</button>
      </div>
    </div>`;
  }).join('');
}

// ── Modal ─────────────────────────────────────────────────────
function abrirModal() {
  document.getElementById('modal-eq-title').textContent = 'Novo Profissional';
  document.getElementById('eq-edit-id').value = '';
  document.getElementById('eq-nome').value = '';
  document.getElementById('eq-comissao').value = '0';
  document.getElementById('modal-eq-msg').className = 'msg';
  document.getElementById('modal-eq').classList.add('show');
  setTimeout(() => document.getElementById('eq-nome').focus(), 100);
}

function editar(id) {
  const b = barbers.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-eq-title').textContent = 'Editar Profissional';
  document.getElementById('eq-edit-id').value = b.id;
  document.getElementById('eq-nome').value = b.name;
  document.getElementById('eq-comissao').value = b.commission_pct || 0;
  document.getElementById('modal-eq-msg').className = 'msg';
  document.getElementById('modal-eq').classList.add('show');
  setTimeout(() => document.getElementById('eq-nome').focus(), 100);
}

function fecharModal() {
  document.getElementById('modal-eq').classList.remove('show');
}

// ── Salvar ────────────────────────────────────────────────────
async function salvar() {
  const btn = document.getElementById('btn-eq-save');
  const editId = document.getElementById('eq-edit-id').value;
  const nome = document.getElementById('eq-nome').value.trim();
  const comissao = parseInt(document.getElementById('eq-comissao').value) || 0;

  if (!nome) { showModalMsg('Informe o nome.', 'error'); return; }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  try {
    if (editId) {
      const r = await fetch(SB_REST + '/barbers?id=eq.' + editId, {
        method: 'PATCH', headers: REST_HEADERS,
        body: JSON.stringify({ name: nome, commission_pct: comissao })
      });
      if (!r.ok) throw new Error(await r.text());
    } else {
      const r = await fetch(SB_REST + '/barbers', {
        method: 'POST', headers: REST_HEADERS,
        body: JSON.stringify({ barbershop_id: shop.id, name: nome, commission_pct: comissao, active: true })
      });
      if (!r.ok) throw new Error(await r.text());
    }

    fecharModal();
    await loadBarbers();

  } catch (e) {
    console.error(e);
    showModalMsg('Erro ao salvar.', 'error');
  }

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';
}

// ── Toggle ativo/inativo ──────────────────────────────────────
async function toggle(id, ativo) {
  await fetch(SB_REST + '/barbers?id=eq.' + id, {
    method: 'PATCH', headers: REST_HEADERS,
    body: JSON.stringify({ active: ativo })
  });
  await loadBarbers();
}

// ── Excluir ───────────────────────────────────────────────────
async function excluir(id, nome, btnEl) {
  if (!btnEl.dataset.confirming) {
    btnEl.textContent = 'Certeza?';
    btnEl.style.color = '#e74c3c';
    btnEl.dataset.confirming = 'true';
    setTimeout(() => {
      btnEl.textContent = 'Excluir';
      btnEl.style.color = '';
      delete btnEl.dataset.confirming;
    }, 3000);
    return;
  }

  await fetch(SB_REST + '/barbers?id=eq.' + id, {
    method: 'DELETE', headers: REST_HEADERS
  });
  await loadBarbers();
}

function showModalMsg(text, type) {
  const el = document.getElementById('modal-eq-msg');
  el.textContent = text;
  el.className = `msg msg-${type} show`;
}
</script>
</body>
</html>
