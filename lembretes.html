<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Lembretes</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NaRegua">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=03271121">
  <link rel="stylesheet" href="css/layout.css?v=03271121">
  <script src="js/theme.js?v=03271121"></script>
  <style>
    .lem-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    .lem-header {
      display:flex; align-items:center; gap:8px;
      padding:12px 0 16px; border-bottom:1px solid var(--borda); margin-bottom:16px;
    }
    .btn-back {
      background:none; border:none; color:var(--texto-secundario); font-size:20px;
      cursor:pointer; padding:4px 8px 4px 0; font-family:inherit; transition:all .2s;
    }
    .btn-back:hover { color:var(--verde-acao); }
    .lem-header h1 { font-size:18px; font-weight:700; flex:1; }

    /* KPI */
    .kpi-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px; }
    .kpi-card {
      background:var(--cinza-escuro); border-radius:12px; padding:12px; text-align:center;
    }
    .kpi-num { font-size:22px; font-weight:800; line-height:1.2; }
    .kpi-label { font-size:8px; color:var(--texto-muted); font-weight:700; letter-spacing:0.5px; margin-top:4px; }
    .kpi-card.red { border:1px solid rgba(239,68,68,0.3); }
    .kpi-card.red .kpi-num { color:#ef4444; }
    .kpi-card.green { border:1px solid rgba(34,197,94,0.3); }
    .kpi-card.green .kpi-num { color:#22c55e; }
    .kpi-card.blue { border:1px solid rgba(59,130,246,0.3); }
    .kpi-card.blue .kpi-num { color:#3b82f6; }

    /* Config inline */
    .config-section {
      background:var(--cinza-escuro); border-radius:12px; padding:14px; margin-bottom:20px;
      border:1px solid var(--borda);
    }
    .config-title {
      font-size:11px; font-weight:700; color:var(--texto-muted); letter-spacing:0.5px;
      margin-bottom:12px; text-transform:uppercase;
    }
    .config-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 0; border-bottom:1px solid var(--borda);
    }
    .config-row:last-child { border-bottom:none; }
    .config-row label { font-size:12px; font-weight:600; flex:1; }
    .config-row input[type="number"] {
      width:54px; text-align:center; padding:6px 4px; border-radius:8px;
      border:1px solid var(--borda); background:var(--bg-app); color:var(--texto-principal);
      font-size:13px; font-weight:700; font-family:'Inter',sans-serif;
    }
    .config-row span { font-size:10px; color:var(--texto-muted); margin-left:4px; }
    .btn-save-config {
      margin-top:10px; width:100%; padding:8px; border-radius:8px; border:none;
      background:var(--verde-acao); color:#000; font-size:11px; font-weight:700;
      cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s;
    }
    .btn-save-config:hover { filter:brightness(1.1); }

    /* Filtros */
    .filters {
      display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;
    }
    .filter-chip {
      padding:6px 12px; border-radius:20px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:11px;
      font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s;
    }
    .filter-chip.active {
      background:var(--verde-acao); color:#000; border-color:var(--verde-acao);
    }

    /* Cards de lembrete */
    .lem-list { display:flex; flex-direction:column; gap:8px; }
    .lem-card {
      background:var(--cinza-escuro); border-radius:12px; padding:14px;
      border:1px solid var(--borda); transition:all .2s;
    }
    .lem-card.sent { opacity:0.5; }
    .lem-card-top {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
    }
    .lem-name { font-size:14px; font-weight:700; }
    .lem-badge {
      font-size:9px; font-weight:700; padding:3px 8px; border-radius:10px;
      letter-spacing:0.3px;
    }
    .lem-badge.urgente { background:rgba(239,68,68,0.15); color:#ef4444; }
    .lem-badge.hoje { background:rgba(245,158,11,0.15); color:#f59e0b; }
    .lem-badge.proximo { background:rgba(59,130,246,0.15); color:#3b82f6; }
    .lem-badge.enviado { background:rgba(34,197,94,0.15); color:#22c55e; }

    .lem-info {
      font-size:11px; color:var(--texto-muted); margin-bottom:10px; line-height:1.6;
    }
    .lem-info strong { color:var(--texto-secundario); }

    .lem-actions { display:flex; gap:6px; }
    .btn-wpp {
      flex:1; padding:8px; border-radius:8px; border:none;
      background:#25D366; color:#fff; font-size:11px; font-weight:700;
      cursor:pointer; font-family:'Inter',sans-serif; display:flex;
      align-items:center; justify-content:center; gap:6px; transition:all .2s;
      text-decoration:none;
    }
    .btn-wpp:hover { filter:brightness(1.1); }
    .btn-mark {
      padding:8px 12px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:11px;
      font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s;
    }
    .btn-mark:hover { border-color:var(--verde-acao); color:var(--verde-acao); }

    .empty-state {
      text-align:center; padding:40px 16px; color:var(--texto-muted);
    }
    .empty-state .icon { font-size:40px; margin-bottom:12px; }
    .empty-state p { font-size:13px; }

    .loading { text-align:center; padding:60px 0; }
    .spinner { margin:0 auto 12px; width:24px; height:24px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--verde-acao); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    body { padding-bottom:70px; }

    /* Bottom nav */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--cinza-escuro); border-top:1px solid var(--borda);
      display:flex; justify-content:center; gap:0; padding:8px 0;
      padding-bottom:max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex:1; max-width:65px; display:flex; flex-direction:column;
      align-items:center; gap:2px; padding:6px 0;
      color:var(--texto-muted); font-size:8px; font-weight:600;
      text-decoration:none; cursor:pointer; border:none; background:none;
      font-family:inherit; transition:all .2s;
    }
    .nav-item.active { color:var(--verde-acao); }
    .nav-item .nav-icon { font-size:16px; }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js?v=03271121"></script>
<script src="js/supabase.js?v=03271121"></script>
<script src="js/utils.js?v=03271121"></script>
<script>
// ADMIN_EMAILS centralizado em utils.js
const _params = new URLSearchParams(window.location.search);
const adminViewingShop = _params.get('shop') || sessionStorage.getItem('admin_viewing_shop');
if (adminViewingShop) sessionStorage.setItem('admin_viewing_shop', adminViewingShop);
const isAdminViewing = !!adminViewingShop;
const db = sb;

let shop = null;
let allReminders = [];
let activeFilter = 'todos';

// Intervalos padrão (dias)
const DEFAULT_INTERVALS = {
  'corte': 21,
  'cabelo': 21,
  'barba': 7,
  'sobrancelha': 15,
  'unha': 14,
  'escova': 21,
  'progressiva': 90,
  'coloração': 30,
  'tintura': 30,
  'hidratação': 30,
  'limpeza de pele': 30,
  'depilação': 30,
  'design': 15,
  'micropigmentação': 365
};
const DEFAULT_FALLBACK = 21;

document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'app.html'; return; }

  if (!ADMIN_EMAILS.includes(session.user.email)) {
    sessionStorage.removeItem('admin_viewing_shop');
  }

  if (ADMIN_EMAILS.includes(session.user.email) && !isAdminViewing) {
    window.location.href = 'admin.html';
    return;
  }

  let shopData;
  if (isAdminViewing) {
    const { data } = await db.from('barbershops').select('*').eq('id', adminViewingShop).single();
    shopData = data;
  } else {
    const { data } = await db.from('barbershops').select('*').eq('owner_id', session.user.id).order('created_at', { ascending: true }).limit(1);
    shopData = data && data[0] ? data[0] : null;
  }

  if (!shopData) { window.location.href = 'app.html'; return; }
  shop = shopData;

  await loadReminders();
});

function getIntervals() {
  const custom = (shop.settings && shop.settings.reminder_intervals) || {};
  return { ...DEFAULT_INTERVALS, ...custom };
}

function getIntervalForService(serviceName) {
  const intervals = getIntervals();
  const name = (serviceName || '').toLowerCase();

  // Busca exata primeiro
  if (intervals[name]) return intervals[name];

  // Busca parcial — se o nome do serviço CONTÉM alguma keyword
  for (const key in intervals) {
    if (name.includes(key)) return intervals[key];
  }

  return (shop.settings && shop.settings.reminder_default_days) || DEFAULT_FALLBACK;
}

async function loadReminders() {
  // Buscar agendamentos concluídos + serviços
  const [apptRes, svcRes] = await Promise.all([
    db.from('appointments')
      .select('client_name, client_phone, service_id, scheduled_at, status')
      .eq('barbershop_id', shop.id)
      .eq('status', 'done')
      .order('scheduled_at', { ascending: false }),
    db.from('services')
      .select('id, name')
      .eq('barbershop_id', shop.id)
  ]);

  const appts = apptRes.data || [];
  const services = {};
  for (const s of (svcRes.data || [])) {
    services[s.id] = s.name;
  }

  // Agrupar por telefone+serviço → pegar a última visita de cada
  const map = {};
  for (const a of appts) {
    if (!a.client_phone) continue;
    const phone = a.client_phone.replace(/\D/g, '');
    const svcName = services[a.service_id] || 'Serviço';
    const key = phone + '|' + a.service_id;

    if (!map[key]) {
      map[key] = {
        name: a.client_name,
        phone: a.client_phone,
        phoneClean: phone,
        serviceId: a.service_id,
        serviceName: svcName,
        lastVisit: a.scheduled_at,
        visits: 0
      };
    }
    map[key].visits++;
    // Nome + data mais recente
    if (a.scheduled_at > map[key].lastVisit) {
      map[key].lastVisit = a.scheduled_at;
      map[key].name = a.client_name;
    }
  }

  // Calcular quem precisa de lembrete
  const now = new Date();
  const today = now.toISOString().slice(0, 10);
  const sentToday = getSentToday();

  allReminders = [];
  for (const key in map) {
    const c = map[key];
    const interval = getIntervalForService(c.serviceName);
    const lastDate = new Date(c.lastVisit);
    const daysSince = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
    const daysUntilDue = interval - daysSince;
    const wasSent = sentToday.includes(key);

    // Mostrar se passou do intervalo OU falta até 3 dias
    if (daysUntilDue <= 3) {
      let urgency = 'proximo';
      if (daysUntilDue <= 0) urgency = daysSince >= interval + 7 ? 'urgente' : 'hoje';
      if (wasSent) urgency = 'enviado';

      allReminders.push({
        ...c,
        key,
        interval,
        daysSince,
        daysOverdue: Math.max(0, daysSince - interval),
        urgency,
        wasSent
      });
    }
  }

  // Ordenar: urgentes primeiro, depois por dias de atraso
  allReminders.sort((a, b) => {
    if (a.wasSent !== b.wasSent) return a.wasSent ? 1 : -1;
    return b.daysOverdue - a.daysOverdue;
  });

  renderAll();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function renderAll() {
  // KPIs
  const pendentes = allReminders.filter(r => !r.wasSent);
  const enviados = allReminders.filter(r => r.wasSent);
  document.getElementById('kpi-pendentes').textContent = pendentes.length;
  document.getElementById('kpi-enviados').textContent = enviados.length;
  document.getElementById('kpi-total').textContent = allReminders.length;

  // Filtros dinâmicos por serviço
  const serviceSet = new Set(allReminders.map(r => r.serviceName));
  const filtersEl = document.getElementById('filters');
  let filtersHTML = '<button class="filter-chip ' + (activeFilter === 'todos' ? 'active' : '') + '" onclick="setFilter(\'todos\')">Todos</button>';
  filtersHTML += '<button class="filter-chip ' + (activeFilter === 'pendentes' ? 'active' : '') + '" onclick="setFilter(\'pendentes\')">Pendentes</button>';
  filtersHTML += '<button class="filter-chip ' + (activeFilter === 'enviados' ? 'active' : '') + '" onclick="setFilter(\'enviados\')">Enviados</button>';
  for (const svc of serviceSet) {
    filtersHTML += '<button class="filter-chip ' + (activeFilter === svc ? 'active' : '') + '" onclick="setFilter(\'' + esc(svc) + '\')">' + esc(svc) + '</button>';
  }
  filtersEl.innerHTML = filtersHTML;

  // Filtrar
  let filtered = allReminders;
  if (activeFilter === 'pendentes') filtered = allReminders.filter(r => !r.wasSent);
  else if (activeFilter === 'enviados') filtered = allReminders.filter(r => r.wasSent);
  else if (activeFilter !== 'todos') filtered = allReminders.filter(r => r.serviceName === activeFilter);

  // Renderizar cards
  const listEl = document.getElementById('lem-list');
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty-state"><div class="icon">&#x2705;</div><p>Nenhum lembrete pendente!</p></div>';
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const badgeLabel = r.urgency === 'urgente' ? 'ATRASADO ' + r.daysOverdue + 'd'
      : r.urgency === 'hoje' ? 'VENCIDO'
      : r.urgency === 'enviado' ? 'ENVIADO'
      : 'EM ' + Math.abs(Math.min(r.interval - r.daysSince, 3)) + ' DIAS';

    const msg = encodeURIComponent(
      'Olá ' + r.name.split(' ')[0] + '! 😊\n\n' +
      'Já faz ' + r.daysSince + ' dias desde o seu último *' + r.serviceName + '*.\n' +
      'Que tal agendar o próximo? Estamos te esperando! 💈✨\n\n' +
      'Agende pelo link: ' + (shop.slug ? 'https://usenaregua.com.br/agendar.html?b=' + shop.slug : '')
    );

    const wppLink = 'https://wa.me/55' + r.phoneClean + '?text=' + msg;

    return '<div class="lem-card ' + (r.wasSent ? 'sent' : '') + '">' +
      '<div class="lem-card-top">' +
        '<div class="lem-name">' + esc(r.name) + '</div>' +
        '<span class="lem-badge ' + r.urgency + '">' + badgeLabel + '</span>' +
      '</div>' +
      '<div class="lem-info">' +
        '<strong>' + esc(r.serviceName) + '</strong> · Última visita: ' + fmtDataCurta(r.lastVisit) + '<br>' +
        'Há <strong>' + r.daysSince + ' dias</strong> · Ciclo: a cada ' + r.interval + ' dias · ' + r.visits + ' visita(s)' +
      '</div>' +
      '<div class="lem-actions">' +
        '<a class="btn-wpp" href="' + wppLink + '" target="_blank" onclick="markSent(\'' + r.key + '\')">&#x1F4AC; Enviar WhatsApp</a>' +
        (r.wasSent
          ? '<button class="btn-mark" onclick="unmarkSent(\'' + r.key + '\')">Desfazer</button>'
          : '<button class="btn-mark" onclick="markSent(\'' + r.key + '\')">&#x2714; Marcar</button>'
        ) +
      '</div>' +
    '</div>';
  }).join('');
}

function fmtDataCurta(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function setFilter(f) {
  activeFilter = f;
  renderAll();
}

// ── Tracking via localStorage ──
function getSentKey() {
  return 'nr_lembretes_' + shop.id + '_' + new Date().toISOString().slice(0, 10);
}

function getSentToday() {
  try {
    return JSON.parse(localStorage.getItem(getSentKey()) || '[]');
  } catch { return []; }
}

function markSent(key) {
  const sent = getSentToday();
  if (!sent.includes(key)) sent.push(key);
  localStorage.setItem(getSentKey(), JSON.stringify(sent));
  // Atualizar urgency
  const r = allReminders.find(r => r.key === key);
  if (r) { r.wasSent = true; r.urgency = 'enviado'; }
  renderAll();
}

function unmarkSent(key) {
  let sent = getSentToday();
  sent = sent.filter(k => k !== key);
  localStorage.setItem(getSentKey(), JSON.stringify(sent));
  const r = allReminders.find(r => r.key === key);
  if (r) {
    r.wasSent = false;
    r.urgency = r.daysOverdue >= 7 ? 'urgente' : r.daysOverdue > 0 ? 'hoje' : 'proximo';
  }
  renderAll();
}

// ── Config intervalos ──
function toggleConfig() {
  const el = document.getElementById('config-section');
  const isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  if (isHidden) renderConfig();
}

async function renderConfig() {
  // Buscar serviços pra listar
  const { data: svcs } = await db.from('services').select('id, name').eq('barbershop_id', shop.id).eq('active', true).order('name');

  const intervals = getIntervals();
  const container = document.getElementById('config-rows');

  // Default geral
  let html = '<div class="config-row">' +
    '<label>Padrão geral</label>' +
    '<input type="number" id="cfg-default" min="1" max="365" value="' + ((shop.settings && shop.settings.reminder_default_days) || DEFAULT_FALLBACK) + '">' +
    '<span>dias</span></div>';

  for (const s of (svcs || [])) {
    const interval = getIntervalForService(s.name);
    html += '<div class="config-row">' +
      '<label>' + esc(s.name) + '</label>' +
      '<input type="number" class="svc-interval" data-name="' + esc(s.name.toLowerCase()) + '" min="1" max="365" value="' + interval + '">' +
      '<span>dias</span></div>';
  }

  container.innerHTML = html;
}

async function saveConfig() {
  const defaultDays = parseInt(document.getElementById('cfg-default').value) || DEFAULT_FALLBACK;
  const inputs = document.querySelectorAll('.svc-interval');
  const intervals = {};
  inputs.forEach(inp => {
    const name = inp.dataset.name;
    const val = parseInt(inp.value);
    if (name && val) intervals[name] = val;
  });

  const settings = { ...(shop.settings || {}), reminder_intervals: intervals, reminder_default_days: defaultDays };
  const { error } = await db.from('barbershops').update({ settings }).eq('id', shop.id);

  if (error) {
    alert('Erro ao salvar: ' + error.message);
    return;
  }

  shop.settings = settings;
  document.getElementById('config-section').style.display = 'none';
  await loadReminders();
}
</script>
