<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Meus Agendamentos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NaRegua">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=03231036">
  <script src="js/theme.js?v=03231036"></script>
  <style>
    body { background:#000; }
    .cli-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    .cli-header {
      text-align:center; padding:24px 0 20px;
    }
    .cli-header img { height:48px; margin-bottom:8px; }
    .cli-header h1 { font-size:18px; font-weight:700; margin-bottom:4px; }
    .cli-header p { font-size:12px; color:var(--texto-muted); }

    .phone-form {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:20px; margin-bottom:20px;
    }
    .phone-form label { font-size:10px; font-weight:700; letter-spacing:1px; color:var(--texto-muted); display:block; margin-bottom:8px; }
    .phone-form input {
      width:100%; padding:12px 14px; background:var(--cinza-medio); border:1px solid var(--borda);
      border-radius:8px; color:var(--texto-principal); font-size:16px; font-family:inherit;
      box-sizing:border-box;
    }
    .phone-form input:focus { border-color:var(--verde-acao); outline:none; }
    .phone-form input::placeholder { color:var(--texto-muted); }
    .phone-form button {
      width:100%; margin-top:12px; padding:14px; border-radius:10px; border:none;
      background:var(--verde-acao); color:#000; font-size:14px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .phone-form button:hover { background:var(--verde-hover); }
    .phone-form button:disabled { opacity:0.5; cursor:not-allowed; }

    .tab-bar {
      display:flex; gap:0; margin-bottom:16px; border-bottom:1px solid var(--borda);
    }
    .tab-btn {
      flex:1; padding:12px 0; background:none; border:none; border-bottom:2px solid transparent;
      color:var(--texto-muted); font-size:12px; font-weight:700; font-family:inherit;
      cursor:pointer; transition:all .2s; letter-spacing:0.5px;
    }
    .tab-btn.active { color:var(--verde-acao); border-bottom-color:var(--verde-acao); }

    .appt-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:14px; margin-bottom:10px; transition:all .2s;
    }
    .appt-card:hover { border-color:var(--borda-hover); }
    .appt-date { font-size:12px; color:var(--texto-muted); margin-bottom:4px; }
    .appt-time { font-size:16px; font-weight:800; color:var(--verde-acao); }
    .appt-info { font-size:13px; font-weight:600; margin-top:6px; }
    .appt-sub { font-size:12px; color:var(--texto-muted); margin-top:2px; }

    .appt-status {
      font-size:9px; font-weight:700; padding:3px 8px; border-radius:12px;
      letter-spacing:0.5px; text-transform:uppercase;
    }
    .status-pending { background:rgba(245,158,11,0.15); color:#f59e0b; }
    .status-confirmed { background:rgba(212,168,83,0.15); color:#d4a853; }
    .status-done { background:rgba(34,197,94,0.15); color:#22c55e; }
    .status-cancelled { background:rgba(239,68,68,0.15); color:#ef4444; }
    .status-no_show { background:rgba(155,89,182,0.15); color:#9b59b6; }

    .btn-cancel-appt {
      margin-top:10px; width:100%; padding:10px; border-radius:8px; border:1px solid rgba(239,68,68,0.3);
      background:rgba(239,68,68,0.08); color:#ef4444; font-size:12px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .btn-cancel-appt:hover { background:rgba(239,68,68,0.15); }

    .btn-reagendar {
      margin-top:6px; width:100%; padding:10px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:12px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .btn-reagendar:hover { border-color:var(--verde-acao); color:var(--verde-acao); }

    .stats-bar {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px;
    }
    .stat-mini {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:10px; text-align:center;
    }
    .stat-mini .num { font-size:18px; font-weight:800; }
    .stat-mini .lbl { font-size:9px; color:var(--texto-muted); font-weight:700; letter-spacing:0.5px; margin-top:2px; }

    .empty-state {
      text-align:center; padding:40px 20px; color:var(--texto-muted);
    }
    .empty-icon { font-size:40px; margin-bottom:12px; }

    .toast {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:#22c55e; color:#000; padding:12px 24px; border-radius:10px;
      font-size:13px; font-weight:700; font-family:inherit; z-index:9999;
      animation:fadeUp 0.3s ease;
    }

    .cli-footer {
      text-align:center; padding:20px 0; font-size:11px; color:var(--texto-muted);
    }
    .cli-footer a { color:var(--verde-acao); text-decoration:none; }

    @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<div class="cli-container">

  <div class="cli-header">
    <img src="img/logo.png" alt="NaRegua">
    <h1>Meus Agendamentos</h1>
    <p>Consulte, cancele ou reagende seus horários</p>
  </div>

  <!-- Busca por telefone -->
  <div class="phone-form" id="phone-form">
    <label>SEU TELEFONE</label>
    <input type="tel" id="phone-input" placeholder="(00) 00000-0000" inputmode="numeric" autocomplete="tel">
    <button onclick="buscar()" id="btn-buscar">BUSCAR MEUS HORARIOS</button>
  </div>

  <!-- Resultado -->
  <div id="resultado" style="display:none;">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <div style="font-size:14px;font-weight:700;" id="cli-nome"></div>
        <div style="font-size:11px;color:var(--texto-muted);" id="cli-phone-display"></div>
      </div>
      <button onclick="trocar()" style="background:none;border:1px solid var(--borda);border-radius:8px;padding:6px 12px;color:var(--texto-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">TROCAR</button>
    </div>

    <div class="stats-bar">
      <div class="stat-mini">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">TOTAL</div>
      </div>
      <div class="stat-mini">
        <div class="num" id="stat-proximos" style="color:var(--verde-acao);">0</div>
        <div class="lbl">PROXIMOS</div>
      </div>
      <div class="stat-mini">
        <div class="num" id="stat-feitos" style="color:#22c55e;">0</div>
        <div class="lbl">FEITOS</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="setTab('proximos')" id="tab-proximos">PROXIMOS</button>
      <button class="tab-btn" onclick="setTab('historico')" id="tab-historico">HISTORICO</button>
    </div>

    <div id="appt-list"></div>

  </div>

  <div class="cli-footer">
    Feito com <a href="https://usenaregua.com.br">NaRegua</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js?v=03231036"></script>
<script src="js/supabase.js?v=03231036"></script>
<script src="js/utils.js?v=03231036"></script>
<script>
console.log('Cliente v1');

let allAppts = [];
let currentTab = 'proximos';
let clientPhone = '';
const DIAS_SEMANA = ['Domingo', 'Segunda', 'Terca', 'Quarta', 'Quinta', 'Sexta', 'Sabado'];
const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

// Mascara telefone
const phoneInput = document.getElementById('phone-input');
phoneInput.addEventListener('input', () => {
  let v = phoneInput.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 6) v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
  else if (v.length > 2) v = '(' + v.slice(0,2) + ') ' + v.slice(2);
  else if (v.length > 0) v = '(' + v;
  phoneInput.value = v;
});
phoneInput.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

// Checar se ja tem telefone salvo
const saved = localStorage.getItem('naregua_client_phone');
if (saved) {
  phoneInput.value = saved;
  buscar();
}

async function buscar() {
  const raw = phoneInput.value.replace(/\D/g, '');
  if (raw.length < 10) {
    showToast('Informe um telefone válido com DDD.');
    return;
  }

  const btn = document.getElementById('btn-buscar');
  btn.disabled = true;
  btn.textContent = 'BUSCANDO...';

  clientPhone = raw;
  localStorage.setItem('naregua_client_phone', phoneInput.value);

  // Buscar agendamentos via RPC (retorna tudo enriquecido)
  const { data: rpcData, error: rpcError } = await sb.rpc('client_lookup_by_phone', { p_phone: raw });
  if (rpcError || !Array.isArray(rpcData)) {
    btn.disabled = false;
    btn.textContent = 'BUSCAR MEUS HORARIOS';
    showToast('Erro ao buscar. Tente novamente.');
    return;
  }
  const appts = rpcData;

  // Mapear dados enriquecidos
  allAppts = appts.map(a => ({
    ...a,
    _shop: { id: a.barbershop_id, name: a.barbershop_name, slug: a.barbershop_slug, phone: a.barbershop_phone },
    _barber: a.barber_name ? { id: a.barber_id, name: a.barber_name } : null,
    _service: a.service_name ? { id: a.service_id, name: a.service_name, price: a.service_price } : null
  }));

  btn.disabled = false;
  btn.textContent = 'BUSCAR MEUS HORARIOS';

  if (!allAppts.length) {
    document.getElementById('phone-form').style.display = 'block';
    document.getElementById('resultado').style.display = 'none';
    showToast('Nenhum agendamento encontrado com esse telefone.');
    return;
  }

  // Preencher header
  document.getElementById('cli-nome').textContent = allAppts[0].client_name;
  document.getElementById('cli-phone-display').textContent = phoneInput.value;

  // Stats
  const agora = new Date();
  const proximos = allAppts.filter(a => ['pending','confirmed'].includes(a.status) && new Date(a.scheduled_at) >= agora);
  const feitos = allAppts.filter(a => a.status === 'done');
  document.getElementById('stat-total').textContent = allAppts.length;
  document.getElementById('stat-proximos').textContent = proximos.length;
  document.getElementById('stat-feitos').textContent = feitos.length;

  // Mostrar resultado
  document.getElementById('phone-form').style.display = 'none';
  document.getElementById('resultado').style.display = 'block';

  currentTab = 'proximos';
  renderTabs();
  renderList();
}

function trocar() {
  localStorage.removeItem('naregua_client_phone');
  document.getElementById('phone-form').style.display = 'block';
  document.getElementById('resultado').style.display = 'none';
  phoneInput.value = '';
  phoneInput.focus();
}

function setTab(tab) {
  currentTab = tab;
  renderTabs();
  renderList();
}

function renderTabs() {
  document.getElementById('tab-proximos').classList.toggle('active', currentTab === 'proximos');
  document.getElementById('tab-historico').classList.toggle('active', currentTab === 'historico');
}

function renderList() {
  const el = document.getElementById('appt-list');
  const agora = new Date();

  let list;
  if (currentTab === 'proximos') {
    list = allAppts
      .filter(a => ['pending','confirmed'].includes(a.status) && new Date(a.scheduled_at) >= agora)
      .sort((a,b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
  } else {
    list = allAppts
      .filter(a => a.status === 'done' || a.status === 'cancelled' || a.status === 'no_show' || new Date(a.scheduled_at) < agora)
      .sort((a,b) => new Date(b.scheduled_at) - new Date(a.scheduled_at));
  }

  if (!list.length) {
    const msg = currentTab === 'proximos' ? 'Nenhum horário agendado.' : 'Nenhum histórico ainda.';
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">' + (currentTab === 'proximos' ? '&#x1F4C5;' : '&#x1F4CB;') + '</div><div>' + msg + '</div></div>';
    return;
  }

  el.innerHTML = list.map(a => {
    const dt = new Date(a.scheduled_at);
    const dia = DIAS_SEMANA[dt.getDay()] + ', ' + dt.getDate() + ' de ' + MESES[dt.getMonth()];
    const hora = dt.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    const svcName = a._service ? a._service.name : '—';
    const svcPrice = a._service ? formatMoney(a._service.price) : '';
    const barberName = a._barber ? a._barber.name : '';
    const shopName = a._shop ? a._shop.name : '';
    const shopSlug = a._shop ? a._shop.slug : '';

    const statusMap = {
      pending: { label: 'PENDENTE', cls: 'status-pending' },
      confirmed: { label: 'CONFIRMADO', cls: 'status-confirmed' },
      done: { label: 'ATENDIDO', cls: 'status-done' },
      cancelled: { label: 'CANCELADO', cls: 'status-cancelled' },
      no_show: { label: 'FALTOU', cls: 'status-no_show' }
    };
    const st = statusMap[a.status] || statusMap.pending;

    const canCancel = ['pending','confirmed'].includes(a.status) && new Date(a.scheduled_at) > agora;
    const cancelBtn = canCancel
      ? '<button class="btn-cancel-appt" onclick="cancelar(\'' + a.id + '\',this)">CANCELAR AGENDAMENTO</button>'
      : '';
    const reagendarUrl = canCancel && shopSlug
      ? 'agendar.html?slug=' + encodeURIComponent(shopSlug) + '&nome=' + encodeURIComponent(a.client_name || '') + '&phone=' + encodeURIComponent((a.client_phone || '').replace(/\D/g, ''))
      : '';
    const reagendarBtn = reagendarUrl
      ? '<button class="btn-reagendar" onclick="window.location.href=\'' + reagendarUrl + '\'">REAGENDAR</button>'
      : '';

    return '<div class="appt-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div class="appt-date">' + dia + '</div>' +
        '<span class="appt-status ' + st.cls + '">' + st.label + '</span>' +
      '</div>' +
      '<div class="appt-time">' + hora + '</div>' +
      '<div class="appt-info">' + esc(svcName) + (svcPrice ? ' · ' + svcPrice : '') + '</div>' +
      (barberName ? '<div class="appt-sub">Com ' + esc(barberName) + '</div>' : '') +
      (shopName ? '<div class="appt-sub">' + esc(shopName) + '</div>' : '') +
      cancelBtn + reagendarBtn +
    '</div>';
  }).join('');
}

async function cancelar(id, btn) {
  if (!btn.dataset.confirming) {
    btn.textContent = 'TEM CERTEZA? CLIQUE DE NOVO';
    btn.dataset.confirming = 'true';
    setTimeout(() => { btn.textContent = 'CANCELAR AGENDAMENTO'; delete btn.dataset.confirming; }, 4000);
    return;
  }

  btn.textContent = 'CANCELANDO...';
  btn.disabled = true;

  // Cancelar via RPC
  const appt = allAppts.find(a => a.id === id);
  if (appt && appt.group_id) {
    // Cancelar todos do grupo
    const groupAppts = allAppts.filter(a => a.group_id === appt.group_id);
    for (const ga of groupAppts) {
      await sb.rpc('client_cancel_appointment', { p_id: ga.id, p_phone: clientPhone });
    }
  } else {
    await sb.rpc('client_cancel_appointment', { p_id: id, p_phone: clientPhone });
  }

  // Atualizar local
  allAppts = allAppts.map(a => a.id === id ? { ...a, status: 'cancelled' } : a);
  if (appt && appt.group_id) {
    allAppts = allAppts.map(a => a.group_id === appt.group_id ? { ...a, status: 'cancelled' } : a);
  }

  // Atualizar stats
  const agora = new Date();
  const proximos = allAppts.filter(a => ['pending','confirmed'].includes(a.status) && new Date(a.scheduled_at) >= agora);
  const feitos = allAppts.filter(a => a.status === 'done');
  document.getElementById('stat-proximos').textContent = proximos.length;
  document.getElementById('stat-feitos').textContent = feitos.length;

  renderList();
  showToast('Agendamento cancelado');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
<script src="js/ajuda.js?v=03231036"></script>
<script src="js/sw-update.js?v=03231036"></script>
</body>
</html>
