<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Dashboard</title>
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NaRegua">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dash-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    /* Header */
    .dash-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0 16px; border-bottom:1px solid var(--borda); margin-bottom:16px;
    }
    .dash-header .shop-name { font-size:16px; font-weight:700; }
    .dash-header .shop-city { font-size:11px; color:var(--texto-muted); }
    .header-actions { display:flex; gap:8px; }
    .icon-btn {
      width:36px; height:36px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .2s;
    }
    .icon-btn:hover { border-color:var(--borda-hover); background:rgba(255,255,255,0.03); }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
    .stat-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:12px; text-align:center;
    }
    .stat-num { font-size:18px; font-weight:800; font-family:'Inter',sans-serif; }
    .stat-label { font-size:9px; color:var(--texto-muted); font-weight:700; letter-spacing:1px; margin-top:4px; }

    /* Navegação de data */
    .date-nav {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px;
    }
    .date-nav-btn {
      width:36px; height:36px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .2s; font-family:inherit;
    }
    .date-nav-btn:hover { border-color:var(--borda-hover); }
    .date-nav-label { font-size:14px; font-weight:700; }
    .date-nav-sub { font-size:11px; color:var(--texto-muted); text-align:center; }
    .date-nav-today {
      font-size:11px; color:var(--verde-acao); font-weight:700; cursor:pointer;
      background:none; border:none; font-family:inherit;
    }

    /* Cards de agendamento */
    .appt-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:14px; margin-bottom:10px; transition:all .2s;
    }
    .appt-card:hover { border-color:var(--borda-hover); }
    .appt-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .appt-time { font-size:20px; font-weight:800; color:var(--verde-acao); }
    .appt-status {
      font-size:9px; font-weight:700; letter-spacing:0.5px; padding:4px 10px;
      border-radius:20px; text-transform:uppercase;
    }
    .status-pending { background:rgba(243,156,18,0.15); color:#f39c12; }
    .status-confirmed { background:rgba(212,168,83,0.15); color:#d4a853; }
    .status-done { background:rgba(255,255,255,0.08); color:var(--texto-muted); }
    .status-cancelled { background:rgba(231,76,60,0.1); color:#e74c3c; text-decoration:line-through; }
    .status-no_show { background:rgba(155,89,182,0.15); color:#9b59b6; }

    .appt-client { font-size:14px; font-weight:600; margin-bottom:2px; }
    .appt-detail { font-size:12px; color:var(--texto-muted); }
    .appt-actions { display:flex; gap:6px; margin-top:10px; }
    .appt-btn {
      flex:1; padding:8px 0; border-radius:8px; border:none; font-size:11px;
      font-weight:700; font-family:inherit; cursor:pointer; transition:all .2s;
      letter-spacing:0.5px;
    }
    .appt-btn:hover { opacity:0.85; }
    .btn-confirm-appt { background:rgba(212,168,83,0.15); color:#d4a853; }
    .btn-done-appt { background:rgba(212,168,83,0.15); color:#d4a853; }
    .btn-cancel-appt { background:rgba(231,76,60,0.1); color:#e74c3c; }
    .btn-noshow { background:rgba(155,89,182,0.15); color:#9b59b6; }
    .btn-whatsapp { background:rgba(37,211,102,0.15); color:#25d366; }

    .empty-state {
      text-align:center; padding:40px 20px; color:var(--texto-muted);
    }
    .empty-icon { font-size:40px; margin-bottom:12px; }
    .empty-text { font-size:13px; }

    /* Layout por barbeiro */
    .barbers-grid {
      display:grid; gap:16px;
    }
    @media (min-width: 600px) {
      .barbers-grid { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      .dash-container { max-width:900px; }
    }
    .barber-column {
      background:var(--cinza-medio); border:1px solid var(--borda);
      border-radius:12px; padding:12px; min-height:120px;
    }
    .barber-header {
      display:flex; align-items:center; gap:8px; padding-bottom:10px;
      margin-bottom:10px; border-bottom:1px solid var(--borda);
    }
    .barber-avatar {
      width:32px; height:32px; border-radius:50%;
      background:var(--verde-medio); display:flex; align-items:center;
      justify-content:center; font-size:14px; font-weight:800; color:#fff;
    }
    .barber-name { font-size:14px; font-weight:700; }
    .barber-count {
      margin-left:auto; font-size:10px; font-weight:700; color:var(--texto-muted);
      background:rgba(255,255,255,0.06); padding:3px 8px; border-radius:10px;
    }
    .barber-empty {
      text-align:center; padding:20px 10px; font-size:12px; color:var(--texto-muted);
    }
    .barber-appt {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:10px 12px; margin-bottom:8px; transition:all .2s;
    }
    .barber-appt:last-child { margin-bottom:0; }
    .barber-appt:hover { border-color:var(--borda-hover); }
    .barber-appt-time {
      font-size:16px; font-weight:800; color:var(--verde-acao); margin-bottom:4px;
    }
    .barber-appt-client { font-size:13px; font-weight:600; margin-bottom:2px; }
    .barber-appt-svc { font-size:11px; color:var(--texto-muted); }
    .barber-appt-actions { display:flex; gap:4px; margin-top:8px; }
    .barber-appt-actions .appt-btn { font-size:10px; padding:6px 0; }

    /* Link compartilhar */
    .share-bar {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:12px 14px; margin-bottom:16px; display:flex; align-items:center;
      justify-content:space-between; gap:10px;
    }
    .share-bar .link { font-size:11px; color:var(--texto-muted); word-break:break-all; flex:1; }
    .share-bar .copy-btn {
      background:var(--verde-acao); color:#000; border:none; border-radius:6px;
      padding:6px 12px; font-size:11px; font-weight:700; cursor:pointer;
      font-family:inherit; white-space:nowrap;
    }

    /* Bottom nav */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--cinza-escuro); border-top:1px solid var(--borda);
      display:flex; justify-content:center; gap:0; padding:8px 0;
      padding-bottom:max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex:1; max-width:65px; display:flex; flex-direction:column;
      align-items:center; gap:2px; padding:6px 0;
      color:var(--texto-muted); font-size:8px; font-weight:600;
      text-decoration:none; cursor:pointer; border:none; background:none;
      font-family:inherit; transition:all .2s;
    }
    .nav-item.active { color:var(--verde-acao); }
    .nav-item .nav-icon { font-size:16px; }

    /* Filtros */
    .filters {
      display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;
    }
    .filter-chip {
      padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700;
      border:1.5px solid var(--borda); background:transparent; color:var(--texto-muted);
      cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap;
    }
    .filter-chip:hover { border-color:var(--borda-hover); }
    .filter-chip.active { border-color:var(--verde-acao); background:rgba(212,168,83,0.1); color:var(--verde-acao); }
    .filter-chip .count {
      display:inline-block; min-width:16px; text-align:center;
      background:rgba(255,255,255,0.08); border-radius:10px; padding:1px 5px;
      font-size:9px; margin-left:4px;
    }
    .filter-chip.active .count { background:rgba(212,168,83,0.2); }

    .btn-delete {
      flex:1; padding:8px 0; border-radius:8px; border:none; font-size:11px;
      font-weight:700; font-family:inherit; cursor:pointer; transition:all .2s;
      background:rgba(231,76,60,0.1); color:#e74c3c; letter-spacing:0.5px;
    }
    .btn-delete:hover { opacity:0.85; }

    /* Modal */
    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0; z-index:1000;
      background:rgba(0,0,0,0.7); display:none; align-items:center;
      justify-content:center; padding:16px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--cinza-escuro); border:1px solid var(--borda);
      border-radius:12px; width:100%; max-width:460px; max-height:90vh;
      overflow-y:auto; padding:24px 20px; animation:fadeUp 0.3s ease;
    }
    .modal-title {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px;
    }
    .modal-title h2 { font-size:16px; }
    .modal-close {
      background:none; border:none; color:var(--texto-muted); font-size:18px;
      cursor:pointer; padding:4px 8px;
    }
    .modal-section {
      font-size:10px; color:var(--texto-muted); font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase;
      margin:20px 0 10px; padding-top:16px; border-top:1px solid var(--borda);
    }
    .modal-section:first-of-type { border:none; margin-top:0; padding-top:0; }

    /* Barbeiro row no modal */
    .barber-row {
      display:flex; align-items:center; gap:8px; padding:8px 0;
      border-bottom:1px solid var(--borda);
    }
    .barber-row input {
      flex:1; padding:8px 10px; background:var(--cinza-medio); border:1px solid var(--borda);
      border-radius:6px; color:var(--texto-principal); font-size:13px; font-family:inherit;
    }
    .barber-row input:focus { border-color:var(--verde-acao); outline:none; }
    .barber-row-del {
      background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.2);
      border-radius:6px; color:#e74c3c; font-size:14px; cursor:pointer;
      width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    }

    /* Dias no modal */
    .days-modal { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .day-btn {
      padding:8px 12px; border-radius:8px; font-size:12px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all .2s; border:1px solid var(--borda);
      background:transparent; color:var(--texto-muted);
    }
    .day-btn.active { border-color:var(--verde-acao); background:rgba(212,168,83,0.15); color:var(--verde-acao); }

    .pay-method-btn {
      flex:1; padding:12px 0; border-radius:10px; border:1.5px solid var(--borda);
      background:transparent; color:var(--texto-muted); font-size:11px;
      font-weight:700; font-family:inherit; cursor:pointer; transition:all .2s;
      text-align:center;
    }
    .pay-method-btn:hover { border-color:var(--borda-hover); }
    .pay-method-btn.active { border-color:var(--verde-acao); background:rgba(212,168,83,0.1); color:var(--verde-acao); }
    .pay-method-btn .pay-icon { font-size:18px; display:block; margin-bottom:4px; }

    body { padding-bottom:70px; }
  </style>
</head>
<body>

<div class="dash-container">

  <!-- BUG 14 ALTO FIX: Loading screen enquanto carrega dados -->
  <div id="dash-loading" style="text-align:center;padding:60px 0;">
    <div class="spinner" style="margin:0 auto 12px;width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--verde-acao);border-radius:50%;animation:spin .6s linear infinite;"></div>
    <div style="font-size:13px;color:var(--texto-muted);">Carregando agenda...</div>
  </div>

  <!-- Header -->
  <div class="dash-header" style="display:none;" id="dash-content-header">
    <div>
      <div class="shop-name" id="shop-name"></div>
      <div class="shop-city" id="shop-city"></div>
    </div>
    <div class="header-actions">
      <button style="padding:6px 12px;border-radius:8px;border:none;background:var(--verde-acao);color:#000;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;" onclick="abrirEncaixe()">+ ENCAIXE</button>
      <button class="icon-btn" onclick="abrirEdicao()" title="Editar">&#x270F;&#xFE0F;</button>
      <button class="icon-btn" onclick="logout()" title="Sair">&#x23FB;</button>
    </div>
  </div>

  <!-- Acoes rapidas -->
  <div id="share-bar" style="display:none;">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button onclick="compartilharWhatsApp()" style="flex:1;padding:10px 8px;border-radius:12px;border:none;background:rgba(37,211,102,0.12);color:#25d366;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.3;">
        <span style="font-size:18px;">&#x1F4C5;</span>ENVIAR LINK DE<br>AGENDAMENTO
      </button>
      <button onclick="enviarLinkBarbeiroZap()" style="flex:1;padding:10px 8px;border-radius:12px;border:none;background:rgba(212,168,83,0.1);color:var(--verde-acao);font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.3;">
        <span style="font-size:18px;">&#x1F4AA;</span>CADASTRAR<br>BARBEIRO
      </button>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="copiarLink()" id="btn-copy" style="flex:1;padding:6px;border-radius:6px;border:1px solid var(--borda);background:transparent;color:var(--texto-muted);font-size:9px;font-weight:600;font-family:inherit;cursor:pointer;">copiar link agendamento</button>
      <button onclick="copiarLinkBarbeiro()" id="btn-copy-barb" style="flex:1;padding:6px;border-radius:6px;border:1px solid var(--borda);background:transparent;color:var(--texto-muted);font-size:9px;font-weight:600;font-family:inherit;cursor:pointer;">copiar link barbeiro</button>
    </div>
    <div style="font-size:10px;color:var(--texto-muted);word-break:break-all;margin-top:6px;display:none;" id="share-link"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="dash-stats" style="grid-template-columns:1fr 1fr 1fr 1fr;display:none;">
    <div class="stat-card">
      <div class="stat-num" id="stat-total" style="color:var(--texto-principal);">0</div>
      <div class="stat-label">AGENDADOS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-done" style="color:var(--verde-acao);">0</div>
      <div class="stat-label">ATENDIDOS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-noshow" style="color:#9b59b6;">0</div>
      <div class="stat-label">FALTARAM</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-revenue" style="color:var(--verde-acao);">0</div>
      <div class="stat-label">FATURADO</div>
    </div>
  </div>

  <!-- Navegação de data -->
  <div class="date-nav" id="dash-date-nav" style="display:none;">
    <button class="date-nav-btn" onclick="changeDay(-1)">‹</button>
    <div style="text-align:center;">
      <div class="date-nav-label" id="date-label"></div>
      <button class="date-nav-today" id="btn-today" onclick="goToday()" style="display:none;">voltar pra hoje</button>
    </div>
    <button class="date-nav-btn" onclick="changeDay(1)">›</button>
  </div>

  <!-- Filtros -->
  <div class="filters" id="filters" style="display:none;"></div>

  <!-- Lista de agendamentos -->
  <div id="appt-list" style="display:none;"></div>

</div>

<!-- Modal edição -->
<div class="modal-overlay" id="modal-edit" onclick="if(event.target===this)fecharEdicao()">
  <div class="modal">
    <div class="modal-title">
      <h2>Editar Estabelecimento</h2>
      <button class="modal-close" onclick="fecharEdicao()">✕</button>
    </div>

    <div id="edit-msg" class="msg"></div>

    <div class="modal-section">Dados</div>
    <div class="field">
      <label>NOME DO ESTABELECIMENTO</label>
      <input type="text" id="edit-name">
    </div>
    <div class="field">
      <label>CIDADE</label>
      <input type="text" id="edit-city">
    </div>
    <div class="field">
      <label>WHATSAPP</label>
      <input type="tel" autocomplete="tel" id="edit-phone">
    </div>

    <div class="modal-section">Horários</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field">
        <label>ABRE ÀS</label>
        <input type="time" id="edit-open">
      </div>
      <div class="field">
        <label>FECHA ÀS</label>
        <input type="time" id="edit-close">
      </div>
    </div>
    <div class="field">
      <label>DIAS QUE ABRE</label>
      <div class="days-modal" id="edit-days"></div>
    </div>

    <div class="modal-section">Profissionais</div>
    <div id="edit-barbers"></div>
    <button class="btn btn-outline" onclick="addBarberRow()" style="margin:10px 0 16px;font-size:12px;">+ ADICIONAR BARBEIRO</button>

    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="fecharEdicao()" style="flex:0.4;">CANCELAR</button>
      <button class="btn btn-primary" onclick="salvarEdicao()" id="btn-save-edit" style="flex:0.6;">
        <span class="btn-label">SALVAR</span>
        <div class="spinner" style="display:none;"></div>
      </button>
    </div>
  </div>
</div>

<!-- Modal vaga aberta (remarketing) -->
<div class="modal-overlay" id="modal-vaga" onclick="if(event.target===this)fecharModalVaga()">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title">
      <h2>Vaga aberta!</h2>
      <button class="modal-close" onclick="fecharModalVaga()">✕</button>
    </div>
    <div style="font-size:12px;color:var(--texto-muted);margin-bottom:16px;" id="vaga-info"></div>
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--texto-muted);margin-bottom:10px;">CLIENTES COM HORÁRIO MAIS TARDE</div>
    <div id="vaga-clientes"></div>
    <button class="btn btn-outline" onclick="fecharModalVaga()" style="margin-top:12px;width:100%;">FECHAR</button>
  </div>
</div>

<!-- Modal pagamento -->
<div class="modal-overlay" id="modal-pagamento" onclick="if(event.target===this)fecharModalPag()">
  <div class="modal" style="max-width:340px;text-align:center;">
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--texto-muted);margin-bottom:12px;">REGISTRAR PAGAMENTO</div>
    <div id="pag-cliente" style="font-size:15px;font-weight:700;margin-bottom:4px;"></div>
    <div id="pag-servico" style="font-size:12px;color:var(--texto-muted);margin-bottom:4px;"></div>
    <div id="pag-valor" style="font-size:24px;font-weight:800;color:var(--verde-acao);margin-bottom:16px;"></div>
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--texto-muted);margin-bottom:8px;">FORMA DE PAGAMENTO</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;" id="pag-metodos"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="fecharModalPag()" style="flex:0.4;">CANCELAR</button>
      <button class="btn btn-primary" onclick="confirmarPagamento()" id="btn-pag-confirm" style="flex:0.6;">
        <span class="btn-label">CONFIRMAR</span>
        <div class="spinner" style="display:none;"></div>
      </button>
    </div>
  </div>
</div>

<!-- Modal Encaixe -->
<div class="modal-overlay" id="modal-encaixe">
  <div class="modal" style="max-width:380px;">
    <div class="modal-title">
      <h2>Encaixe rapido</h2>
      <button class="modal-close" onclick="fecharEncaixe()">&#x2715;</button>
    </div>
    <div id="encaixe-msg" class="msg"></div>
    <div class="field">
      <label>PROFISSIONAL *</label>
      <select id="enc-barber" style="width:100%;padding:10px;background:var(--cinza-medio);border:1px solid var(--borda);border-radius:8px;color:var(--texto-principal);font-size:14px;font-family:inherit;"></select>
    </div>
    <div class="field">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js?v=3"></script>
<script src="js/utils.js?v=3"></script>
<script src="js/push.js?v=1"></script>
<script>
console.log('Dashboard v3 carregado');
// ── Estado ────────────────────────────────────────────────────
let shop = null;
let services = [];
let barbers = [];
let currentDate = new Date();
let currentFilter = 'all';
let dayAppointments = [];
let _knownApptIds = new Set(); // pra detectar novos agendamentos
let _firstLoad = true;
const DIAS_SEMANA = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

// ── Init ──────────────────────────────────────────────────────
const ADMIN_EMAILS = ['duam-rt@hotmail.com'];
const _params = new URLSearchParams(window.location.search);
const adminViewingShop = _params.get('shop') || sessionStorage.getItem('admin_viewing_shop');
if (adminViewingShop) sessionStorage.setItem('admin_viewing_shop', adminViewingShop);
const isAdminViewing = !!adminViewingShop;

// Helpers — usam sb autenticado (RLS cuida do acesso)
async function restUpdate(table, filter, data) {
  // filter no formato "id=eq.xxx"
  const [col, val] = filter.replace('=eq.', '|').split('|');
  const { data: result } = await sb.from(table).update(data).eq(col, val).select();
  return result;
}

async function restDelete(table, filter) {
  const [col, val] = filter.replace('=eq.', '|').split('|');
  const { error } = await sb.from(table).delete().eq(col, val);
  return !error;
}

const db = sb;

document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  if (ADMIN_EMAILS.includes(session.user.email) && !isAdminViewing) {
    window.location.href = 'admin.html';
    return;
  }

  let shopData;
  if (isAdminViewing) {
    const { data } = await db.from('barbershops').select('*').eq('id', adminViewingShop).single();
    shopData = data;
  } else {
    const { data } = await db.from('barbershops').select('*').eq('owner_id', session.user.id).maybeSingle();
    shopData = data;
  }

  if (!shopData) { window.location.href = 'onboarding.html'; return; }
  shop = shopData;

  document.getElementById('shop-name').textContent = shop.name;
  document.getElementById('shop-city').textContent = shop.city + (shop.phone ? ' · ' + shop.phone : '');

  // Banner admin
  if (isAdminViewing) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;';
    banner.innerHTML = `<span style="font-size:11px;color:#e74c3c;font-weight:700;">ADMIN · Visualizando ${esc(shop.name)}</span>
      <button onclick="sessionStorage.removeItem('admin_viewing_shop');location.href='admin.html'" style="background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">VOLTAR</button>`;
    document.querySelector('.dash-container').insertBefore(banner, document.querySelector('.dash-header'));
  }

  // Buscar serviços e barbeiros
  const [svcRes, barbRes] = await Promise.all([
    db.from('services').select('*').eq('barbershop_id', shop.id),
    db.from('barbers').select('*').eq('barbershop_id', shop.id)
  ]);
  services = svcRes.data || [];
  barbers = barbRes.data || [];

  // Link público
  const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', '');
  document.getElementById('share-link').textContent = baseUrl + 'agendar.html?slug=' + shop.slug;

  // Pedir permissao de notificacao + push
  requestNotificationPermission();
  initPush(shop.id);

  // BUG 14 ALTO FIX: esconder loading e mostrar conteúdo
  document.getElementById('dash-loading').style.display = 'none';
  document.getElementById('dash-content-header').style.display = 'flex';
  document.getElementById('share-bar').style.display = '';
  document.getElementById('dash-stats').style.display = 'grid';
  document.getElementById('dash-date-nav').style.display = 'flex';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('appt-list').style.display = 'block';

  renderDay();

  // Atualizar automaticamente a cada 30s (pega novos agendamentos)
  setInterval(() => renderDay(), 30000);
});

// ── Navegação de dias ─────────────────────────────────────────
function changeDay(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  renderDay();
}

function goToday() {
  currentDate = new Date();
  renderDay();
}

function isToday(d) {
  const today = new Date();
  return d.getFullYear() === today.getFullYear() &&
         d.getMonth() === today.getMonth() &&
         d.getDate() === today.getDate();
}

function renderDateLabel() {
  const d = currentDate;
  const label = document.getElementById('date-label');
  const btnToday = document.getElementById('btn-today');

  if (isToday(d)) {
    label.textContent = 'Hoje, ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    btnToday.style.display = 'none';
  } else {
    label.textContent = DIAS_SEMANA[d.getDay()] + ', ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    btnToday.style.display = 'block';
  }
}

// ── Renderizar dia ────────────────────────────────────────────
async function renderDay() {
  renderDateLabel();

  const dateStr = currentDate.getFullYear() + '-' + String(currentDate.getMonth()+1).padStart(2,'0') + '-' + String(currentDate.getDate()).padStart(2,'0');
  const dayStart = dateStr + 'T00:00:00-03:00';
  const dayEnd = dateStr + 'T23:59:59-03:00';

  const { data: appts } = await sb
    .from('appointments')
    .select('*')
    .eq('barbershop_id', shop.id)
    .gte('scheduled_at', dayStart)
    .lte('scheduled_at', dayEnd)
    .order('scheduled_at', { ascending: true });

  dayAppointments = appts || [];

  // Verificar novos agendamentos e notificar
  if (isToday(currentDate)) {
    checkNewAppointments(dayAppointments);
  }

  // Auto-confirmar pendentes com mais de 5 minutos
  if (isToday(currentDate)) {
    await autoConfirmar();
  }

  renderFilters();
  renderAppointments();
}

async function autoConfirmar() {
  const agora = new Date();
  const cincoMinAtras = new Date(agora.getTime() - 5 * 60000);
  const pendentes = dayAppointments.filter(a =>
    a.status === 'pending' && new Date(a.created_at) < cincoMinAtras
  );

  if (pendentes.length > 0) {
    for (const p of pendentes) {
      await restUpdate('appointments', 'id=eq.' + p.id, { status: 'confirmed' });
    }

    // Atualizar local
    pendentes.forEach(a => a.status = 'confirmed');
  }
}

function renderFilters() {
  const el = document.getElementById('filters');
  const counts = { all: 0, pending: 0, confirmed: 0, done: 0, cancelled: 0, no_show: 0 };
  dayAppointments.forEach(a => {
    counts.all++;
    counts[a.status] = (counts[a.status] || 0) + 1;
  });

  const filters = [
    { key: 'all', label: 'Todos', count: counts.all },
    { key: 'pending', label: 'Pendentes', count: counts.pending },
    { key: 'confirmed', label: 'Confirmados', count: counts.confirmed },
    { key: 'done', label: 'Atendidos', count: counts.done },
    { key: 'no_show', label: 'Faltaram', count: counts.no_show },
    { key: 'cancelled', label: 'Cancelados', count: counts.cancelled },
  ];

  el.innerHTML = filters.filter(f => f.count > 0 || f.key === 'all').map(f =>
    `<button class="filter-chip ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">
      ${f.label}<span class="count">${f.count}</span>
    </button>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  renderAppointments();
}

function renderAppointments() {
  const list = currentFilter === 'all' ? dayAppointments : dayAppointments.filter(a => a.status === currentFilter);
  const el = document.getElementById('appt-list');

  // Stats (sempre do dia todo, não do filtro)
  const ativos = dayAppointments.filter(a => !['cancelled','no_show'].includes(a.status));
  const done = dayAppointments.filter(a => a.status === 'done');
  const noShow = dayAppointments.filter(a => a.status === 'no_show');
  // BUG 7 FIX: price_paid como fonte primária
  const faturamento = done.reduce((s, a) => {
    const valor = Number(a.price_paid) || (() => { const svc = services.find(sv => sv.id === a.service_id); return svc ? Number(svc.price) : 0; })();
    return s + valor;
  }, 0);

  document.getElementById('stat-total').textContent = ativos.length;
  document.getElementById('stat-done').textContent = done.length;
  document.getElementById('stat-noshow').textContent = noShow.length;
  document.getElementById('stat-revenue').textContent = faturamento > 0 ? formatMoney(faturamento).replace('R$ ', '') : '0';

  if (!dayAppointments.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">Nenhum agendamento${isToday(currentDate) ? ' pra hoje' : ' neste dia'}.</div>
      <div style="margin-top:12px;font-size:11px;color:var(--texto-muted);">
        Compartilhe seu link pra receber agendamentos!
      </div>
    </div>`;
    return;
  }

  // Agrupar por barbeiro
  const columns = barbers.map(b => {
    const appts = list.filter(a => a.barber_id === b.id).sort((a,c) => new Date(a.scheduled_at) - new Date(c.scheduled_at));
    return { barber: b, appts };
  });

  // Agendamentos sem barbeiro definido
  const semBarbeiro = list.filter(a => !a.barber_id || !barbers.find(b => b.id === a.barber_id));
  if (semBarbeiro.length) {
    columns.push({ barber: { id: null, name: 'Sem barbeiro' }, appts: semBarbeiro });
  }

  el.innerHTML = `<div class="barbers-grid">${columns.map(col => {
    const inicial = col.barber.name.charAt(0).toUpperCase();
    const cards = col.appts.map(a => renderApptCard(a)).join('');
    // Verificar se e folga ou livre
    let empty = '';
    if (col.appts.length === 0) {
      const dow = currentDate.getDay();
      const sched = col.barber.schedule;
      const workDays = col.barber.working_days || [];
      const isFolga = sched ? !sched[dow] : (workDays.length > 0 && !workDays.includes(dow));
      empty = isFolga
        ? '<div class="barber-empty" style="color:#f59e0b;">FOLGA</div>'
        : '<div class="barber-empty">Sem agendamentos</div>';
    }

    return `<div class="barber-column">
      <div class="barber-header">
        <div class="barber-avatar">${inicial}</div>
        <div class="barber-name">${esc(col.barber.name)}</div>
        <div class="barber-count">${col.appts.length}</div>
      </div>
      ${cards}${empty}
    </div>`;
  }).join('')}</div>`;
}

function renderApptCard(a) {
  const svc = services.find(s => s.id === a.service_id);
  const hora = new Date(a.scheduled_at);
  const timeStr = hora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const svcName = svc ? svc.name : '—';
  const svcPrice = svc ? formatMoney(svc.price) : '';
  const isDiaInteiro = svc && svc.blocks_all_day;
  const phone = (a.client_phone || '').replace(/\D/g, '');

  const statusMap = {
    pending: { label: 'PENDENTE', cls: 'status-pending' },
    confirmed: { label: 'CONFIRMADO', cls: 'status-confirmed' },
    done: { label: 'ATENDIDO', cls: 'status-done' },
    cancelled: { label: 'CANCELADO', cls: 'status-cancelled' },
    no_show: { label: 'FALTOU', cls: 'status-no_show' }
  };
  const st = statusMap[a.status] || statusMap.pending;

  // Verificar se passou a tolerância de 15 min após o horário marcado
  const agora = new Date();
  const horario = new Date(a.scheduled_at);
  const TOLERANCIA_MIN = 15;
  const limiteTolerancia = new Date(horario.getTime() + TOLERANCIA_MIN * 60000);
  const jaPassou = agora > limiteTolerancia;

  let actions = '';
  if (a.status === 'pending') {
    actions = `
      <button class="appt-btn btn-confirm-appt" onclick="updateStatus('${esc(a.id)}','confirmed',this)">CONFIRMAR</button>
      <button class="appt-btn btn-cancel-appt" onclick="cancelarComVaga('${esc(a.id)}',this)">CANCELAR</button>
      ${phone ? `<button class="appt-btn btn-whatsapp" onclick="abrirWhatsApp('${esc(a.id)}')">ZAP</button>` : ''}
    `;
  } else if (a.status === 'confirmed') {
    if (jaPassou) {
      actions = `
        <button class="appt-btn btn-done-appt" onclick="abrirModalPagamento('${esc(a.id)}')">ATENDIDO</button>
        <button class="appt-btn btn-noshow" onclick="updateStatus('${esc(a.id)}','no_show',this)">FALTOU</button>
      `;
    } else {
      actions = `
        <button class="appt-btn btn-done-appt" onclick="abrirModalPagamento('${esc(a.id)}')">CONCLUIR</button>
        <button class="appt-btn btn-cancel-appt" onclick="cancelarComVaga('${esc(a.id)}',this)">CANCELAR</button>
        ${phone ? `<button class="appt-btn btn-whatsapp" onclick="abrirWhatsApp('${esc(a.id)}')">ZAP</button>` : ''}
      `;
    }
  } else if (a.status === 'cancelled' || a.status === 'no_show') {
    actions = `<button class="btn-delete" onclick="excluirAgendamento('${a.id}',this)">EXCLUIR</button>`;
  }

  return `<div class="barber-appt">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div class="barber-appt-time">${timeStr}</div>
      <span class="appt-status ${st.cls}">${st.label}</span>
    </div>
    <div class="barber-appt-client">${esc(a.client_name)}</div>
    <div class="barber-appt-svc">${svcName} · ${svcPrice}${isDiaInteiro ? ' · <span style="color:#9b59b6;font-weight:700;">DIA INTEIRO</span>' : ''}</div>
    ${a.client_phone ? `<div class="barber-appt-svc">📱 ${esc(a.client_phone)}</div>` : ''}
    ${actions ? `<div class="barber-appt-actions">${actions}</div>` : ''}
  </div>`;
}

// ── Ações ─────────────────────────────────────────────────────
async function updateStatus(id, status, btnEl) {
  const labels = { cancelled:'Cancelar', no_show:'Marcar falta', done:'Concluir', confirmed:'Confirmar' };
  const destructive = ['cancelled','no_show'].includes(status);

  if (destructive && !btnEl.dataset.confirming) {
    const original = btnEl.textContent;
    btnEl.textContent = 'Certeza?';
    btnEl.dataset.confirming = 'true';
    setTimeout(() => { btnEl.textContent = original; delete btnEl.dataset.confirming; }, 3000);
    return;
  }

  btnEl.textContent = '...';
  btnEl.disabled = true;

  try {
    const appt = dayAppointments.find(a => a.id === id);
    if (appt && appt.group_id) {
      await restUpdate('appointments', 'group_id=eq.' + appt.group_id, { status });
    } else {
      await restUpdate('appointments', 'id=eq.' + id, { status });
    }
  } catch (e) {
    console.error('Erro ao atualizar status:', e);
  }
  renderDay();
}

async function excluirAgendamento(id, btnEl) {
  if (!btnEl.dataset.confirming) {
    btnEl.textContent = 'Certeza?';
    btnEl.style.color = '#ef4444';
    btnEl.dataset.confirming = 'true';
    setTimeout(() => { btnEl.textContent = 'EXCLUIR'; btnEl.style.color = ''; delete btnEl.dataset.confirming; }, 3000);
    return;
  }

  btnEl.textContent = '...';
  btnEl.disabled = true;

  const appt = dayAppointments.find(a => a.id === id);
  if (appt && appt.group_id) {
    await restDelete('appointments', 'group_id=eq.' + appt.group_id);
    dayAppointments = dayAppointments.filter(a => a.group_id !== appt.group_id);
  } else {
    await restDelete('appointments', 'id=eq.' + id);
    dayAppointments = dayAppointments.filter(a => a.id !== id);
  }
  renderFilters();
  renderAppointments();
}

function abrirWhatsApp(apptId) {
  const a = dayAppointments.find(x => x.id === apptId);
  if (!a) return;
  const phone = (a.client_phone || '').replace(/\D/g, '');
  if (!phone) return;
  const svc = services.find(s => s.id === a.service_id);
  const hora = new Date(a.scheduled_at);
  const dataStr = hora.toLocaleDateString('pt-BR');
  const horaStr = hora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const h = new Date().getHours();
  const saudacao = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';

  const msg = saudacao + ', ' + a.client_name + '! Aqui e da *' + shop.name + '*.\n\n'
    + 'Seu horario ta confirmado:\n\n'
    + '*' + (svc ? svc.name : 'Servico') + '*\n'
    + 'Dia: ' + dataStr + ' as ' + horaStr + '\n\n'
    + 'Se precisar remarcar, avisa com pelo menos 2h de antecedencia pra gente encaixar outro cliente.\n\n'
    + 'Te esperamos!';

  window.open('https://wa.me/55' + phone + '?text=' + encodeURIComponent(msg), '_blank');
}

// ── Edição da barbearia ───────────────────────────────────────
const DIAS_LABEL = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
let editDays = [];
let editBarbersList = [];

function abrirEdicao() {
  if (isAdminViewing) { alert('Use o painel Admin pra editar.'); return; }
  document.getElementById('edit-name').value = shop.name || '';
  document.getElementById('edit-city').value = shop.city || '';
  document.getElementById('edit-phone').value = shop.phone || '';
  document.getElementById('edit-open').value = shop.opening_time || '08:00';
  document.getElementById('edit-close').value = shop.closing_time || '19:00';
  editDays = [...(shop.days_open || [1,2,3,4,5,6])];
  renderEditDays();

  editBarbersList = barbers.map(b => ({ id: b.id, name: b.name, active: b.active }));
  renderEditBarbers();

  document.getElementById('edit-msg').className = 'msg';
  document.getElementById('modal-edit').classList.add('show');
}

function fecharEdicao() {
  document.getElementById('modal-edit').classList.remove('show');
}

function renderEditDays() {
  document.getElementById('edit-days').innerHTML = DIAS_LABEL.map((d, i) =>
    `<button type="button" class="day-btn ${editDays.includes(i) ? 'active' : ''}" onclick="toggleEditDay(${i})">${d}</button>`
  ).join('');
}

function toggleEditDay(i) {
  if (editDays.includes(i)) {
    editDays = editDays.filter(d => d !== i);
  } else {
    editDays.push(i);
    editDays.sort();
  }
  renderEditDays();
}

function renderEditBarbers() {
  document.getElementById('edit-barbers').innerHTML = editBarbersList.map((b, i) =>
    `<div class="barber-row">
      <input type="text" value="${esc(b.name)}" onchange="editBarbersList[${i}].name=this.value">
      <button class="barber-row-del" onclick="removeBarberRow(${i})" title="Remover">✕</button>
    </div>`
  ).join('');
}

function addBarberRow() {
  editBarbersList.push({ id: null, name: '', active: true });
  renderEditBarbers();
  // Focar no novo input
  const inputs = document.querySelectorAll('#edit-barbers input');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function removeBarberRow(i) {
  editBarbersList.splice(i, 1);
  renderEditBarbers();
}

async function salvarEdicao() {
  const btn = document.getElementById('btn-save-edit');
  const name = document.getElementById('edit-name').value.trim();
  const city = document.getElementById('edit-city').value.trim().toUpperCase();
  const phone = document.getElementById('edit-phone').value.trim();
  const opening = document.getElementById('edit-open').value;
  const closing = document.getElementById('edit-close').value;
  if (!name) { showEditMsg('Informe o nome.', 'error'); return; }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  try {
    // Atualizar barbearia
    let slug = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    // BUG 9 FIX: verificar slug duplicado
    const { data: existingSlug } = await db.from('barbershops').select('id').eq('slug', slug).neq('id', shop.id);
    if (existingSlug && existingSlug.length > 0) {
      slug = slug + '-' + Math.random().toString(36).slice(2, 6);
    }
    const { error: shopErr } = await db.from('barbershops').update({
      name, slug, city, phone, opening_time: opening, closing_time: closing,
      days_open: editDays
    }).eq('id', shop.id);

    if (shopErr) throw shopErr;

    // Atualizar barbeiros
    // Remover os que não estão mais na lista
    const editIds = editBarbersList.filter(b => b.id).map(b => b.id);
    const toRemove = barbers.filter(b => !editIds.includes(b.id));
    for (const b of toRemove) {
      await db.from('barbers').delete().eq('id', b.id);
    }

    // Atualizar existentes e criar novos
    for (const b of editBarbersList) {
      if (!b.name.trim()) continue;
      if (b.id) {
        await db.from('barbers').update({ name: b.name.trim() }).eq('id', b.id);
      } else {
        await db.from('barbers').insert({
          barbershop_id: shop.id, name: b.name.trim(), commission_pct: 0, active: true
        });
      }
    }

    // Recarregar dados
    const { data: shopData } = await db.from('barbershops').select('*').eq('id', shop.id).single();
    shop = shopData;
    const { data: barbData } = await db.from('barbers').select('*').eq('barbershop_id', shop.id);
    barbers = barbData || [];

    // Atualizar header
    document.getElementById('shop-name').textContent = shop.name;
    document.getElementById('shop-city').textContent = shop.city + (shop.phone ? ' · ' + shop.phone : '');
    const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', '');
    document.getElementById('share-link').textContent = baseUrl + 'agendar.html?slug=' + shop.slug;

    fecharEdicao();
    renderDay();

  } catch (e) {
    console.error(e);
    const msg = e.message?.includes('duplicate') ? 'Já existe um estabelecimento com esse nome.' : 'Erro ao salvar. Tente novamente.';
    showEditMsg(msg, 'error');
  }

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';
}

function showEditMsg(text, type) {
  const el = document.getElementById('edit-msg');
  el.textContent = text;
  el.className = `msg msg-${type} show`;
}

// ── Modal pagamento ───────────────────────────────────────────
let _pagApptId = null;
let _pagMethod = 'pix';

function abrirModalPagamento(apptId) {
  const a = dayAppointments.find(x => x.id === apptId);
  if (!a) return;
  const svc = services.find(s => s.id === a.service_id);
  _pagApptId = apptId;
  _pagMethod = 'pix';

  document.getElementById('pag-cliente').textContent = a.client_name;
  document.getElementById('pag-servico').textContent = svc ? svc.name : '—';
  document.getElementById('pag-valor').textContent = formatMoney(svc ? svc.price : 0);
  renderPayMethods();
  document.getElementById('modal-pagamento').classList.add('show');
}

function fecharModalPag() {
  document.getElementById('modal-pagamento').classList.remove('show');
  _pagApptId = null;
}

function renderPayMethods() {
  const metodos = [
    { key: 'pix', icon: '📲', label: 'PIX' },
    { key: 'dinheiro', icon: '💵', label: 'Dinheiro' },
    { key: 'cartao', icon: '💳', label: 'Cartão' },
  ];
  document.getElementById('pag-metodos').innerHTML = metodos.map(m =>
    `<button class="pay-method-btn ${_pagMethod === m.key ? 'active' : ''}" onclick="setPagMethod('${m.key}')">
      <span class="pay-icon">${m.icon}</span>${m.label}
    </button>`
  ).join('');
}

function setPagMethod(m) {
  _pagMethod = m;
  renderPayMethods();
}

async function confirmarPagamento() {
  if (!_pagApptId) return;
  const btn = document.getElementById('btn-pag-confirm');
  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  const a = dayAppointments.find(x => x.id === _pagApptId);
  const svc = a ? services.find(s => s.id === a.service_id) : null;
  const price = svc ? Number(svc.price) : 0;

  // Se tem group_id, atualiza todo o grupo
  const updateData = { status: 'done', price_paid: price, payment_method: _pagMethod };
  let result;
  if (a && a.group_id) {
    result = await restUpdate('appointments', 'group_id=eq.' + a.group_id, updateData);
  } else {
    result = await restUpdate('appointments', 'id=eq.' + _pagApptId, updateData);
  }

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';

  if (!result) {
    alert('Erro ao concluir. Verifique o console.');
    return;
  }

  fecharModalPag();
  await renderDay();
}

// ── Remarketing de vaga ───────────────────────────────────────
async function cancelarComVaga(apptId, btnEl) {
  // Confirmação duplo clique
  if (!btnEl.dataset.confirming) {
    const original = btnEl.textContent;
    btnEl.textContent = 'Certeza?';
    btnEl.dataset.confirming = 'true';
    setTimeout(() => { btnEl.textContent = original; delete btnEl.dataset.confirming; }, 3000);
    return;
  }

  btnEl.textContent = '...';
  btnEl.disabled = true;

  const cancelado = dayAppointments.find(a => a.id === apptId);
  if (!cancelado) return;

  // Cancelar o agendamento
  const appt = dayAppointments.find(a => a.id === apptId);
  if (appt && appt.group_id) {
    await restUpdate('appointments', 'group_id=eq.' + appt.group_id, { status: 'cancelled' });
  } else {
    await restUpdate('appointments', 'id=eq.' + apptId, { status: 'cancelled' });
  }

  // Buscar clientes com horário POSTERIOR no mesmo dia e barbeiro
  const horaCancelada = new Date(cancelado.scheduled_at);
  const posteriores = dayAppointments.filter(a =>
    a.id !== apptId &&
    ['pending', 'confirmed'].includes(a.status) &&
    a.barber_id === cancelado.barber_id &&
    new Date(a.scheduled_at) > horaCancelada
  ).sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));

  await renderDay();

  // Se tem clientes posteriores, mostrar modal
  if (posteriores.length > 0) {
    const horaVaga = horaCancelada.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    const svcCancelado = services.find(s => s.id === cancelado.service_id);
    document.getElementById('vaga-info').innerHTML =
      'O horário das <strong>' + horaVaga + '</strong>' +
      (svcCancelado ? ' (' + esc(svcCancelado.name) + ')' : '') +
      ' foi cancelado. Avise os clientes abaixo que podem antecipar:';

    document.getElementById('vaga-clientes').innerHTML = posteriores.map(a => {
      const svc = services.find(s => s.id === a.service_id);
      const hora = new Date(a.scheduled_at);
      const horaStr = hora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
      const phone = (a.client_phone || '').replace(/\D/g, '');
      const h = new Date().getHours();
      const saudacao = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
      const waMsg = saudacao + ', ' + a.client_name + '! Aqui e da *' + shop.name + '*.\n\n'
        + 'Abriu uma vaga mais cedo: *' + horaVaga + '*\n'
        + 'Seu horario atual: ' + horaStr + '\n\n'
        + 'Quer antecipar? Me responde aqui que eu troco pra voce!';
      const waLink = phone ? 'https://wa.me/55' + phone + '?text=' + encodeURIComponent(waMsg) : '';

      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--borda);">
        <div>
          <div style="font-size:13px;font-weight:600;">${esc(a.client_name)}</div>
          <div style="font-size:11px;color:var(--texto-muted);">${svc ? svc.name : '—'} · ${horaStr}</div>
        </div>
        ${waLink ? `<a href="${waLink}" target="_blank" style="padding:8px 14px;border-radius:8px;background:rgba(37,211,102,0.15);color:#25d366;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;">AVISAR</a>` : ''}
      </div>`;
    }).join('');

    document.getElementById('modal-vaga').classList.add('show');
  }
}

function fecharModalVaga() {
  document.getElementById('modal-vaga').classList.remove('show');
}

// ── Notificações ──────────────────────────────────────────────
// AudioContext precisa ser desbloqueado com interação do usuário (mobile)
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
// Desbloquear no primeiro toque/clique
document.addEventListener('click', () => getAudioCtx(), { once: true });
document.addEventListener('touchstart', () => getAudioCtx(), { once: true });

function playNotificationSound() {
  try {
    const ctx = getAudioCtx();
    // 3 beeps fortes (dó-mi-sol) repetidos 2x
    const notas = [523, 659, 784, 523, 659, 784];
    notas.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.value = 0.3;
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.2 + 0.18);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + i * 0.2 + 0.18);
    });
  } catch (e) { console.error('Audio error:', e); }
}

function sendBrowserNotification(title, body) {
  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'img/logo.png' });
  }
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function checkNewAppointments(appts) {
  if (_firstLoad) {
    // Primeiro carregamento: só registrar IDs sem notificar
    (appts || []).forEach(a => _knownApptIds.add(a.id));
    _firstLoad = false;
    return;
  }

  const novos = (appts || []).filter(a => !_knownApptIds.has(a.id));
  (appts || []).forEach(a => _knownApptIds.add(a.id));

  if (novos.length > 0) {
    playNotificationSound();
    novos.forEach(a => {
      const svc = services.find(s => s.id === a.service_id);
      const hora = new Date(a.scheduled_at);
      const horaStr = hora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
      sendBrowserNotification(
        'Novo agendamento!',
        a.client_name + ' — ' + (svc ? svc.name : 'Serviço') + ' às ' + horaStr
      );
    });
  }
}

// ── Encaixe rapido ────────────────────────────────────────
function abrirEncaixe() {
  const selBarber = document.getElementById('enc-barber');
  selBarber.innerHTML = barbers.filter(b => b.active).map(b =>
    '<option value="' + b.id + '">' + esc(b.name) + '</option>'
  ).join('');

  const selService = document.getElementById('enc-service');
  selService.innerHTML = services.filter(s => s.active !== false).map(s =>
    '<option value="' + s.id + '">' + esc(s.name) + ' (' + formatMoney(s.price) + ')</option>'
  ).join('');

  document.getElementById('enc-name').value = '';
  document.getElementById('enc-phone').value = '';
  document.getElementById('encaixe-msg').className = 'msg';
  document.getElementById('modal-encaixe').classList.add('show');
}

function fecharEncaixe() {
  document.getElementById('modal-encaixe').classList.remove('show');
}

async function salvarEncaixe() {
  const btn = document.getElementById('btn-encaixe');
  const barberId = document.getElementById('enc-barber').value;
  const serviceId = document.getElementById('enc-service').value;
  const nome = document.getElementById('enc-name').value.trim() || 'Cliente avulso';
  const phone = document.getElementById('enc-phone').value.trim();

  if (!barberId || !serviceId) {
    const el = document.getElementById('encaixe-msg');
    el.textContent = 'Selecione profissional e servico.';
    el.className = 'msg msg-error show';
    return;
  }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  // Horario = agora arredondado pra proximos 15min
  const agora = new Date();
  const min = agora.getMinutes();
  const rounded = Math.ceil(min / 15) * 15;
  agora.setMinutes(rounded, 0, 0);
  const dateStr = agora.getFullYear() + '-' + String(agora.getMonth()+1).padStart(2,'0') + '-' + String(agora.getDate()).padStart(2,'0');
  const timeStr = String(agora.getHours()).padStart(2,'0') + ':' + String(agora.getMinutes()).padStart(2,'0');
  const scheduledAt = dateStr + 'T' + timeStr + ':00-03:00';

  const { error } = await sb.from('appointments').insert({
    barbershop_id: shop.id,
    barber_id: barberId,
    service_id: serviceId,
    client_name: nome,
    client_phone: phone,
    scheduled_at: scheduledAt,
    status: 'confirmed'
  });

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';

  if (error) {
    const el = document.getElementById('encaixe-msg');
    el.textContent = 'Erro ao encaixar. Tente novamente.';
    el.className = 'msg msg-error show';
    return;
  }

  fecharEncaixe();
  renderDay();
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
