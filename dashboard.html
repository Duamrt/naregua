<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dash-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    /* Header */
    .dash-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0 16px; border-bottom:1px solid var(--borda); margin-bottom:16px;
    }
    .dash-header .shop-name { font-size:16px; font-weight:700; }
    .dash-header .shop-city { font-size:11px; color:var(--texto-muted); }
    .header-actions { display:flex; gap:8px; }
    .icon-btn {
      width:36px; height:36px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .2s;
    }
    .icon-btn:hover { border-color:var(--borda-hover); background:rgba(255,255,255,0.03); }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
    .stat-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:12px; text-align:center;
    }
    .stat-num { font-size:22px; font-weight:800; font-family:'Inter',sans-serif; }
    .stat-label { font-size:9px; color:var(--texto-muted); font-weight:700; letter-spacing:1px; margin-top:4px; }

    /* Navegação de data */
    .date-nav {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px;
    }
    .date-nav-btn {
      width:36px; height:36px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .2s; font-family:inherit;
    }
    .date-nav-btn:hover { border-color:var(--borda-hover); }
    .date-nav-label { font-size:14px; font-weight:700; }
    .date-nav-sub { font-size:11px; color:var(--texto-muted); text-align:center; }
    .date-nav-today {
      font-size:11px; color:var(--verde-acao); font-weight:700; cursor:pointer;
      background:none; border:none; font-family:inherit;
    }

    /* Cards de agendamento */
    .appt-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:14px; margin-bottom:10px; transition:all .2s;
    }
    .appt-card:hover { border-color:var(--borda-hover); }
    .appt-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .appt-time { font-size:20px; font-weight:800; color:var(--verde-acao); }
    .appt-status {
      font-size:9px; font-weight:700; letter-spacing:0.5px; padding:4px 10px;
      border-radius:20px; text-transform:uppercase;
    }
    .status-pending { background:rgba(243,156,18,0.15); color:#f39c12; }
    .status-confirmed { background:rgba(46,204,113,0.15); color:#2ecc71; }
    .status-done { background:rgba(255,255,255,0.08); color:var(--texto-muted); }
    .status-cancelled { background:rgba(231,76,60,0.1); color:#e74c3c; text-decoration:line-through; }
    .status-no_show { background:rgba(155,89,182,0.15); color:#9b59b6; }

    .appt-client { font-size:14px; font-weight:600; margin-bottom:2px; }
    .appt-detail { font-size:12px; color:var(--texto-muted); }
    .appt-actions { display:flex; gap:6px; margin-top:10px; }
    .appt-btn {
      flex:1; padding:8px 0; border-radius:8px; border:none; font-size:11px;
      font-weight:700; font-family:inherit; cursor:pointer; transition:all .2s;
      letter-spacing:0.5px;
    }
    .appt-btn:hover { opacity:0.85; }
    .btn-confirm-appt { background:rgba(46,204,113,0.15); color:#2ecc71; }
    .btn-done-appt { background:rgba(46,204,113,0.15); color:#2ecc71; }
    .btn-cancel-appt { background:rgba(231,76,60,0.1); color:#e74c3c; }
    .btn-noshow { background:rgba(155,89,182,0.15); color:#9b59b6; }
    .btn-whatsapp { background:rgba(37,211,102,0.15); color:#25d366; }

    .empty-state {
      text-align:center; padding:40px 20px; color:var(--texto-muted);
    }
    .empty-icon { font-size:40px; margin-bottom:12px; }
    .empty-text { font-size:13px; }

    /* Layout por barbeiro */
    .barbers-grid {
      display:grid; gap:16px;
    }
    @media (min-width: 600px) {
      .barbers-grid { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      .dash-container { max-width:900px; }
    }
    .barber-column {
      background:var(--cinza-medio); border:1px solid var(--borda);
      border-radius:12px; padding:12px; min-height:120px;
    }
    .barber-header {
      display:flex; align-items:center; gap:8px; padding-bottom:10px;
      margin-bottom:10px; border-bottom:1px solid var(--borda);
    }
    .barber-avatar {
      width:32px; height:32px; border-radius:50%;
      background:var(--verde-medio); display:flex; align-items:center;
      justify-content:center; font-size:14px; font-weight:800; color:#fff;
    }
    .barber-name { font-size:14px; font-weight:700; }
    .barber-count {
      margin-left:auto; font-size:10px; font-weight:700; color:var(--texto-muted);
      background:rgba(255,255,255,0.06); padding:3px 8px; border-radius:10px;
    }
    .barber-empty {
      text-align:center; padding:20px 10px; font-size:12px; color:var(--texto-muted);
    }
    .barber-appt {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:10px 12px; margin-bottom:8px; transition:all .2s;
    }
    .barber-appt:last-child { margin-bottom:0; }
    .barber-appt:hover { border-color:var(--borda-hover); }
    .barber-appt-time {
      font-size:16px; font-weight:800; color:var(--verde-acao); margin-bottom:4px;
    }
    .barber-appt-client { font-size:13px; font-weight:600; margin-bottom:2px; }
    .barber-appt-svc { font-size:11px; color:var(--texto-muted); }
    .barber-appt-actions { display:flex; gap:4px; margin-top:8px; }
    .barber-appt-actions .appt-btn { font-size:10px; padding:6px 0; }

    /* Link compartilhar */
    .share-bar {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:12px 14px; margin-bottom:16px; display:flex; align-items:center;
      justify-content:space-between; gap:10px;
    }
    .share-bar .link { font-size:11px; color:var(--texto-muted); word-break:break-all; flex:1; }
    .share-bar .copy-btn {
      background:var(--verde-acao); color:#000; border:none; border-radius:6px;
      padding:6px 12px; font-size:11px; font-weight:700; cursor:pointer;
      font-family:inherit; white-space:nowrap;
    }

    /* Bottom nav */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--cinza-escuro); border-top:1px solid var(--borda);
      display:flex; justify-content:center; gap:0; padding:8px 0;
      padding-bottom:max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex:1; max-width:100px; display:flex; flex-direction:column;
      align-items:center; gap:2px; padding:6px 0;
      color:var(--texto-muted); font-size:10px; font-weight:600;
      text-decoration:none; cursor:pointer; border:none; background:none;
      font-family:inherit; transition:all .2s;
    }
    .nav-item.active { color:var(--verde-acao); }
    .nav-item .nav-icon { font-size:18px; }

    /* Filtros */
    .filters {
      display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;
    }
    .filter-chip {
      padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700;
      border:1.5px solid var(--borda); background:transparent; color:var(--texto-muted);
      cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap;
    }
    .filter-chip:hover { border-color:var(--borda-hover); }
    .filter-chip.active { border-color:var(--verde-acao); background:rgba(46,204,113,0.1); color:var(--verde-acao); }
    .filter-chip .count {
      display:inline-block; min-width:16px; text-align:center;
      background:rgba(255,255,255,0.08); border-radius:10px; padding:1px 5px;
      font-size:9px; margin-left:4px;
    }
    .filter-chip.active .count { background:rgba(46,204,113,0.2); }

    .btn-delete {
      flex:1; padding:8px 0; border-radius:8px; border:none; font-size:11px;
      font-weight:700; font-family:inherit; cursor:pointer; transition:all .2s;
      background:rgba(231,76,60,0.1); color:#e74c3c; letter-spacing:0.5px;
    }
    .btn-delete:hover { opacity:0.85; }

    /* Modal */
    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0; z-index:1000;
      background:rgba(0,0,0,0.7); display:none; align-items:center;
      justify-content:center; padding:16px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--cinza-escuro); border:1px solid var(--borda);
      border-radius:12px; width:100%; max-width:460px; max-height:90vh;
      overflow-y:auto; padding:24px 20px; animation:fadeUp 0.3s ease;
    }
    .modal-title {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px;
    }
    .modal-title h2 { font-size:16px; }
    .modal-close {
      background:none; border:none; color:var(--texto-muted); font-size:18px;
      cursor:pointer; padding:4px 8px;
    }
    .modal-section {
      font-size:10px; color:var(--texto-muted); font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase;
      margin:20px 0 10px; padding-top:16px; border-top:1px solid var(--borda);
    }
    .modal-section:first-of-type { border:none; margin-top:0; padding-top:0; }

    /* Barbeiro row no modal */
    .barber-row {
      display:flex; align-items:center; gap:8px; padding:8px 0;
      border-bottom:1px solid var(--borda);
    }
    .barber-row input {
      flex:1; padding:8px 10px; background:var(--cinza-medio); border:1px solid var(--borda);
      border-radius:6px; color:var(--texto-principal); font-size:13px; font-family:inherit;
    }
    .barber-row input:focus { border-color:var(--verde-acao); outline:none; }
    .barber-row-del {
      background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.2);
      border-radius:6px; color:#e74c3c; font-size:14px; cursor:pointer;
      width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    }

    /* Dias no modal */
    .days-modal { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .day-btn {
      padding:8px 12px; border-radius:8px; font-size:12px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all .2s; border:1px solid var(--borda);
      background:transparent; color:var(--texto-muted);
    }
    .day-btn.active { border-color:var(--verde-acao); background:rgba(46,204,113,0.15); color:var(--verde-acao); }

    body { padding-bottom:70px; }
  </style>
</head>
<body>

<div class="dash-container">

  <!-- Header -->
  <div class="dash-header">
    <div>
      <div class="shop-name" id="shop-name"></div>
      <div class="shop-city" id="shop-city"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="abrirEdicao()" title="Editar barbearia">✏️</button>
      <button class="icon-btn" onclick="compartilharLink()" title="Compartilhar link">🔗</button>
      <button class="icon-btn" onclick="logout()" title="Sair">⏻</button>
    </div>
  </div>

  <!-- Link público -->
  <div class="share-bar" id="share-bar" style="display:none;">
    <div class="link" id="share-link"></div>
    <button class="copy-btn" onclick="copiarLink()">COPIAR</button>
  </div>

  <!-- Stats -->
  <div class="stats-row" style="grid-template-columns:1fr 1fr 1fr 1fr;">
    <div class="stat-card">
      <div class="stat-num" id="stat-total" style="color:var(--texto-principal);">0</div>
      <div class="stat-label">AGENDADOS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-done" style="color:var(--verde-acao);">0</div>
      <div class="stat-label">ATENDIDOS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-noshow" style="color:#9b59b6;">0</div>
      <div class="stat-label">FALTARAM</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-revenue" style="color:var(--verde-acao);">0</div>
      <div class="stat-label">FATURADO</div>
    </div>
  </div>

  <!-- Navegação de data -->
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDay(-1)">‹</button>
    <div style="text-align:center;">
      <div class="date-nav-label" id="date-label"></div>
      <button class="date-nav-today" id="btn-today" onclick="goToday()" style="display:none;">voltar pra hoje</button>
    </div>
    <button class="date-nav-btn" onclick="changeDay(1)">›</button>
  </div>

  <!-- Filtros -->
  <div class="filters" id="filters"></div>

  <!-- Lista de agendamentos -->
  <div id="appt-list"></div>

</div>

<!-- Modal edição -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-title">
      <h2>Editar Barbearia</h2>
      <button class="modal-close" onclick="fecharEdicao()">✕</button>
    </div>

    <div id="edit-msg" class="msg"></div>

    <div class="modal-section">Dados</div>
    <div class="field">
      <label>NOME DA BARBEARIA</label>
      <input type="text" id="edit-name">
    </div>
    <div class="field">
      <label>CIDADE</label>
      <input type="text" id="edit-city">
    </div>
    <div class="field">
      <label>WHATSAPP</label>
      <input type="tel" id="edit-phone">
    </div>

    <div class="modal-section">Horários</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field">
        <label>ABRE ÀS</label>
        <input type="time" id="edit-open">
      </div>
      <div class="field">
        <label>FECHA ÀS</label>
        <input type="time" id="edit-close">
      </div>
    </div>
    <div class="field">
      <label>INTERVALO (MIN)</label>
      <select id="edit-interval" style="width:100%;padding:10px 12px;background:var(--cinza-medio);border:1px solid var(--borda);border-radius:8px;color:var(--texto-principal);font-size:13px;font-family:inherit;">
        <option value="20">20 min</option>
        <option value="30">30 min</option>
        <option value="40">40 min</option>
        <option value="45">45 min</option>

    <div id="edit-barbers"></div>

    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="fecharEdicao()" style="flex:0.4;">CANCELAR</button>
      <button class="btn btn-primary" onclick="salvarEdicao()" id="btn-save-edit" style="flex:0.6;">
        <span class="btn-label">SALVAR</span>
        <div class="spinner" style="display:none;"></div>
      </button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <a class="nav-item active" href="dashboard.html">
    <span class="nav-icon">📅</span>AGENDA
  </a>
  <a class="nav-item" href="servicos.html">
    <span class="nav-icon">✂️</span>SERVIÇOS
  </a>
  <a class="nav-item" href="financeiro.html">
    <span class="nav-icon">💰</span>CAIXA
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script>
// ── Estado ────────────────────────────────────────────────────
let shop = null;
let services = [];
let barbers = [];
let currentDate = new Date();
let currentFilter = 'all';
let dayAppointments = [];
const DIAS_SEMANA = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

// ── Init ──────────────────────────────────────────────────────
const ADMIN_EMAILS = ['duam-rt@hotmail.com'];
const adminViewingShop = sessionStorage.getItem('admin_viewing_shop');
const isAdminViewing = !!adminViewingShop;

// Cliente de banco: admin usa service key (bypass RLS), dono usa anon
const db = isAdminViewing
  ? window.supabase.createClient('https://jsydprrcyrjjxdmzrqpz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzeWRwcnJjeXJqanhkbXpycXB6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzc0MjIxNiwiZXhwIjoyMDg5MzE4MjE2fQ.q_0QPcoipD57qSH-SU7pbS7DELXiOeI9mHq85qvAncs')
  : sb;

document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  if (ADMIN_EMAILS.includes(session.user.email) && !isAdminViewing) {
    window.location.href = 'admin.html';
    return;
  }

  let shopData;
  if (isAdminViewing) {
    const { data } = await db.from('barbershops').select('*').eq('id', adminViewingShop).single();
    shopData = data;
  } else {
    const { data } = await db.from('barbershops').select('*').eq('owner_id', session.user.id).maybeSingle();
    shopData = data;
  }

  if (!shopData) { window.location.href = 'onboarding.html'; return; }
  shop = shopData;

  document.getElementById('shop-name').textContent = shop.name;
  document.getElementById('shop-city').textContent = shop.city + (shop.phone ? ' · ' + shop.phone : '');

  // Banner admin
  if (isAdminViewing) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;';
    banner.innerHTML = `<span style="font-size:11px;color:#e74c3c;font-weight:700;">ADMIN · Visualizando ${esc(shop.name)}</span>
      <button onclick="sessionStorage.removeItem('admin_viewing_shop');location.href='admin.html'" style="background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">VOLTAR</button>`;
    document.querySelector('.dash-container').insertBefore(banner, document.querySelector('.dash-header'));
  }

  // Buscar serviços e barbeiros
  const [svcRes, barbRes] = await Promise.all([
    db.from('services').select('*').eq('barbershop_id', shop.id),
    db.from('barbers').select('*').eq('barbershop_id', shop.id)
  ]);
  services = svcRes.data || [];
  barbers = barbRes.data || [];

  // Link público
  const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', '');
  document.getElementById('share-link').textContent = baseUrl + 'agendar.html?slug=' + shop.slug;

  renderDay();

  // Atualizar automaticamente a cada 30s (pega novos agendamentos)
  setInterval(() => renderDay(), 30000);
});

// ── Navegação de dias ─────────────────────────────────────────
function changeDay(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  renderDay();
}

function goToday() {
  currentDate = new Date();
  renderDay();
}

function isToday(d) {
  const today = new Date();
  return d.getFullYear() === today.getFullYear() &&
         d.getMonth() === today.getMonth() &&
         d.getDate() === today.getDate();
}

function renderDateLabel() {
  const d = currentDate;
  const label = document.getElementById('date-label');
  const btnToday = document.getElementById('btn-today');

  if (isToday(d)) {
    label.textContent = 'Hoje, ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    btnToday.style.display = 'none';
  } else {
    label.textContent = DIAS_SEMANA[d.getDay()] + ', ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    btnToday.style.display = 'block';
  }
}

// ── Renderizar dia ────────────────────────────────────────────
async function renderDay() {
  renderDateLabel();

  const dateStr = currentDate.toISOString().split('T')[0];
  const dayStart = dateStr + 'T00:00:00';
  const dayEnd = dateStr + 'T23:59:59';

  const { data: appts } = await sb
    .from('appointments')
    .select('*')
    .eq('barbershop_id', shop.id)
    .gte('scheduled_at', dayStart)
    .lte('scheduled_at', dayEnd)
    .order('scheduled_at', { ascending: true });

  dayAppointments = appts || [];

  // Auto-confirmar pendentes com mais de 5 minutos
  if (isToday(currentDate)) {
    await autoConfirmar();
  }

  renderFilters();
  renderAppointments();
}

async function autoConfirmar() {
  const agora = new Date();
  const cincoMinAtras = new Date(agora.getTime() - 5 * 60000);
  const pendentes = dayAppointments.filter(a =>
    a.status === 'pending' && new Date(a.created_at) < cincoMinAtras
  );

  if (pendentes.length > 0) {
    const ids = pendentes.map(a => a.id);
    await db.from('appointments')
      .update({ status: 'confirmed' })
      .in('id', ids);

    // Atualizar local
    pendentes.forEach(a => a.status = 'confirmed');
  }
}

function renderFilters() {
  const el = document.getElementById('filters');
  const counts = { all: 0, pending: 0, confirmed: 0, done: 0, cancelled: 0, no_show: 0 };
  dayAppointments.forEach(a => {
    counts.all++;
    counts[a.status] = (counts[a.status] || 0) + 1;
  });

  const filters = [
    { key: 'all', label: 'Todos', count: counts.all },
    { key: 'pending', label: 'Pendentes', count: counts.pending },
    { key: 'confirmed', label: 'Confirmados', count: counts.confirmed },
    { key: 'done', label: 'Atendidos', count: counts.done },
    { key: 'no_show', label: 'Faltaram', count: counts.no_show },
    { key: 'cancelled', label: 'Cancelados', count: counts.cancelled },
  ];

  el.innerHTML = filters.filter(f => f.count > 0 || f.key === 'all').map(f =>
    `<button class="filter-chip ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">
      ${f.label}<span class="count">${f.count}</span>
    </button>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  renderAppointments();
}

function renderAppointments() {
  const list = currentFilter === 'all' ? dayAppointments : dayAppointments.filter(a => a.status === currentFilter);
  const el = document.getElementById('appt-list');

  // Stats (sempre do dia todo, não do filtro)
  const ativos = dayAppointments.filter(a => !['cancelled','no_show'].includes(a.status));
  const done = dayAppointments.filter(a => a.status === 'done');
  const noShow = dayAppointments.filter(a => a.status === 'no_show');
  const faturamento = done.reduce((s, a) => {
    const svc = services.find(sv => sv.id === a.service_id);
    return s + (svc ? Number(svc.price) : 0);
  }, 0);

  document.getElementById('stat-total').textContent = ativos.length;
  document.getElementById('stat-done').textContent = done.length;
  document.getElementById('stat-noshow').textContent = noShow.length;
  document.getElementById('stat-revenue').textContent = faturamento > 0 ? formatMoney(faturamento).replace('R$ ', '') : '0';

  if (!dayAppointments.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">Nenhum agendamento${isToday(currentDate) ? ' pra hoje' : ' neste dia'}.</div>
      <div style="margin-top:12px;font-size:11px;color:var(--texto-muted);">
        Compartilhe seu link pra receber agendamentos!
      </div>
    </div>`;
    return;
  }

  // Agrupar por barbeiro
  const columns = barbers.map(b => {
    const appts = list.filter(a => a.barber_id === b.id).sort((a,c) => new Date(a.scheduled_at) - new Date(c.scheduled_at));
    return { barber: b, appts };
  });

  // Agendamentos sem barbeiro definido
  const semBarbeiro = list.filter(a => !a.barber_id || !barbers.find(b => b.id === a.barber_id));
  if (semBarbeiro.length) {
    columns.push({ barber: { id: null, name: 'Sem barbeiro' }, appts: semBarbeiro });
  }

  el.innerHTML = `<div class="barbers-grid">${columns.map(col => {
    const inicial = col.barber.name.charAt(0).toUpperCase();
    const cards = col.appts.map(a => renderApptCard(a)).join('');
    const empty = col.appts.length === 0
      ? `<div class="barber-empty">Livre${isToday(currentDate) ? ' hoje' : ''}</div>`
      : '';

    return `<div class="barber-column">
      <div class="barber-header">
        <div class="barber-avatar">${inicial}</div>
        <div class="barber-name">${esc(col.barber.name)}</div>
        <div class="barber-count">${col.appts.length}</div>
      </div>
      ${cards}${empty}
    </div>`;
  }).join('')}</div>`;
}

function renderApptCard(a) {
  const svc = services.find(s => s.id === a.service_id);
  const hora = new Date(a.scheduled_at);
  const timeStr = hora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const svcName = svc ? svc.name : '—';
  const svcPrice = svc ? formatMoney(svc.price) : '';
  const phone = (a.client_phone || '').replace(/\D/g, '');

  const statusMap = {
    pending: { label: 'PENDENTE', cls: 'status-pending' },
    confirmed: { label: 'CONFIRMADO', cls: 'status-confirmed' },
    done: { label: 'ATENDIDO', cls: 'status-done' },
    cancelled: { label: 'CANCELADO', cls: 'status-cancelled' },
    no_show: { label: 'FALTOU', cls: 'status-no_show' }
  };
  const st = statusMap[a.status] || statusMap.pending;

  // Verificar se passou a tolerância de 15 min após o horário marcado
  const agora = new Date();
  const horario = new Date(a.scheduled_at);
  const TOLERANCIA_MIN = 15;
  const limiteTolerancia = new Date(horario.getTime() + TOLERANCIA_MIN * 60000);
  const jaPassou = agora > limiteTolerancia;

  let actions = '';
  if (a.status === 'pending') {
    actions = `
      <button class="appt-btn btn-confirm-appt" onclick="updateStatus('${a.id}','confirmed')">CONFIRMAR</button>
      <button class="appt-btn btn-cancel-appt" onclick="updateStatus('${a.id}','cancelled')">CANCELAR</button>
      ${phone ? `<button class="appt-btn btn-whatsapp" onclick="abrirWhatsApp('${phone}','${esc(a.client_name)}')">ZAP</button>` : ''}
    `;
  } else if (a.status === 'confirmed') {
    if (jaPassou) {
      // Horário já passou — mostrar ATENDIDO ou FALTOU
      actions = `
        <button class="appt-btn btn-done-appt" onclick="updateStatus('${a.id}','done')">ATENDIDO</button>
        <button class="appt-btn btn-noshow" onclick="updateStatus('${a.id}','no_show')">FALTOU</button>
      `;
    } else {
      actions = `
        <button class="appt-btn btn-done-appt" onclick="updateStatus('${a.id}','done')">CONCLUIR</button>
        <button class="appt-btn btn-cancel-appt" onclick="updateStatus('${a.id}','cancelled')">CANCELAR</button>
        ${phone ? `<button class="appt-btn btn-whatsapp" onclick="abrirWhatsApp('${phone}','${esc(a.client_name)}')">ZAP</button>` : ''}
      `;
    }
  } else if (a.status === 'cancelled' || a.status === 'no_show') {
    actions = `<button class="btn-delete" onclick="excluirAgendamento('${a.id}')">EXCLUIR</button>`;
  }

  return `<div class="barber-appt">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div class="barber-appt-time">${timeStr}</div>
      <span class="appt-status ${st.cls}">${st.label}</span>
    </div>
    <div class="barber-appt-client">${esc(a.client_name)}</div>
    <div class="barber-appt-svc">${svcName} · ${svcPrice}</div>
    ${a.client_phone ? `<div class="barber-appt-svc">📱 ${a.client_phone}</div>` : ''}
    ${actions ? `<div class="barber-appt-actions">${actions}</div>` : ''}
  </div>`;
}

// ── Ações ─────────────────────────────────────────────────────
async function updateStatus(id, status) {
  await db.from('appointments').update({ status }).eq('id', id);
  renderDay();
}

async function excluirAgendamento(id) {
  await db.from('appointments').delete().eq('id', id);
  dayAppointments = dayAppointments.filter(a => a.id !== id);
  renderFilters();
  renderAppointments();
}

function abrirWhatsApp(phone, nome) {
  const msg = encodeURIComponent('Ola ' + nome + '! Aqui e da ' + shop.name + '.');
  window.open('https://wa.me/55' + phone + '?text=' + msg, '_blank');
}

// ── Compartilhar ──────────────────────────────────────────────
function compartilharLink() {
  const bar = document.getElementById('share-bar');
  bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
}

function copiarLink() {
  const link = document.getElementById('share-link').textContent;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'COPIADO!';
    setTimeout(() => btn.textContent = 'COPIAR', 2000);
  });
}

// ── Edição da barbearia ───────────────────────────────────────
const DIAS_LABEL = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
let editDays = [];
let editBarbersList = [];

function abrirEdicao() {
  document.getElementById('edit-name').value = shop.name || '';
  document.getElementById('edit-city').value = shop.city || '';
  document.getElementById('edit-phone').value = shop.phone || '';
  document.getElementById('edit-open').value = shop.opening_time || '08:00';
  document.getElementById('edit-close').value = shop.closing_time || '19:00';
  document.getElementById('edit-interval').value = shop.interval_min || 30;

  editDays = [...(shop.days_open || [1,2,3,4,5,6])];
  renderEditDays();

  editBarbersList = barbers.map(b => ({ id: b.id, name: b.name, active: b.active }));
  renderEditBarbers();

  document.getElementById('edit-msg').className = 'msg';
  document.getElementById('modal-edit').classList.add('show');
}

function fecharEdicao() {
  document.getElementById('modal-edit').classList.remove('show');
}

function renderEditDays() {
  document.getElementById('edit-days').innerHTML = DIAS_LABEL.map((d, i) =>
    `<button type="button" class="day-btn ${editDays.includes(i) ? 'active' : ''}" onclick="toggleEditDay(${i})">${d}</button>`
  ).join('');
}

function toggleEditDay(i) {
  if (editDays.includes(i)) {
    editDays = editDays.filter(d => d !== i);
  } else {
    editDays.push(i);
    editDays.sort();
  }
  renderEditDays();
}

function renderEditBarbers() {
  document.getElementById('edit-barbers').innerHTML = editBarbersList.map((b, i) =>
    `<div class="barber-row">
      <input type="text" value="${esc(b.name)}" onchange="editBarbersList[${i}].name=this.value">
      <button class="barber-row-del" onclick="removeBarberRow(${i})" title="Remover">✕</button>
    </div>`
  ).join('');
}

function addBarberRow() {
  editBarbersList.push({ id: null, name: '', active: true });
  renderEditBarbers();
  // Focar no novo input
  const inputs = document.querySelectorAll('#edit-barbers input');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function removeBarberRow(i) {
  editBarbersList.splice(i, 1);
  renderEditBarbers();
}

async function salvarEdicao() {
  const btn = document.getElementById('btn-save-edit');
  const name = document.getElementById('edit-name').value.trim();
  const city = document.getElementById('edit-city').value.trim().toUpperCase();
  const phone = document.getElementById('edit-phone').value.trim();
  const opening = document.getElementById('edit-open').value;
  const closing = document.getElementById('edit-close').value;
  const interval = parseInt(document.getElementById('edit-interval').value);

  if (!name) { showEditMsg('Informe o nome.', 'error'); return; }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  try {
    // Atualizar barbearia
    const slug = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    const { error: shopErr } = await db.from('barbershops').update({
      name, slug, city, phone, opening_time: opening, closing_time: closing,
      interval_min: interval, days_open: editDays
    }).eq('id', shop.id);

    if (shopErr) throw shopErr;

    // Atualizar barbeiros
    // Remover os que não estão mais na lista
    const editIds = editBarbersList.filter(b => b.id).map(b => b.id);
    const toRemove = barbers.filter(b => !editIds.includes(b.id));
    for (const b of toRemove) {
      await db.from('barbers').delete().eq('id', b.id);
    }

    // Atualizar existentes e criar novos
    for (const b of editBarbersList) {
      if (!b.name.trim()) continue;
      if (b.id) {
        await db.from('barbers').update({ name: b.name.trim() }).eq('id', b.id);
      } else {
        await db.from('barbers').insert({
          barbershop_id: shop.id, name: b.name.trim(), commission_pct: 0, active: true
        });
      }
    }

    // Recarregar dados
    const { data: shopData } = await db.from('barbershops').select('*').eq('id', shop.id).single();
    shop = shopData;
    const { data: barbData } = await db.from('barbers').select('*').eq('barbershop_id', shop.id);
    barbers = barbData || [];

    // Atualizar header
    document.getElementById('shop-name').textContent = shop.name;
    document.getElementById('shop-city').textContent = shop.city + (shop.phone ? ' · ' + shop.phone : '');
    const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', '');
    document.getElementById('share-link').textContent = baseUrl + 'agendar.html?slug=' + shop.slug;

    fecharEdicao();
    renderDay();

  } catch (e) {
    console.error(e);
    const msg = e.message?.includes('duplicate') ? 'Já existe uma barbearia com esse nome.' : 'Erro ao salvar. Tente novamente.';
    showEditMsg(msg, 'error');
  }

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';
}

function showEditMsg(text, type) {
  const el = document.getElementById('edit-msg');
  el.textContent = text;
  el.className = `msg msg-${type} show`;
}

// ── Logout ────────────────────────────────────────────────────
async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
