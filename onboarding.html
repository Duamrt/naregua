<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Configurar seu negócio</title>
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NaRegua">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-center">
  <div class="card" style="max-width:480px;">
    <div class="card-header">
      <img src="img/logo.png" alt="NaRegua" class="logo-img" style="height:48px;margin-bottom:8px;">
      <p>Vamos configurar seu negócio</p>
    </div>

    <div id="onboarding-msg" class="msg"></div>

    <!-- Step 1: Dados da barbearia -->
    <div id="step-1">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <span style="background:var(--verde-acao);color:#000;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;">1</span>
        <span style="font-size:14px;font-weight:700;">Seu negócio</span>
        <span style="font-size:11px;color:var(--texto-muted);margin-left:auto;">Passo 1 de 3</span>
      </div>

      <div class="field">
        <label>TIPO DE NEGÓCIO *</label>
        <div id="type-grid" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
      </div>
      <div class="field">
        <label>NOME DO ESTABELECIMENTO *</label>
        <input type="text" id="shop-name" placeholder="Ex: Studio Maria, Barbearia do João">
      </div>
      <div class="field">
        <label>CIDADE *</label>
        <input type="text" id="shop-city" placeholder="Ex: Jupi-PE">
      </div>
      <div class="field">
        <label>WHATSAPP</label>
        <input type="tel" autocomplete="tel" id="shop-phone" placeholder="(87) 9 9999-9999">
      </div>

      <button class="btn btn-primary" onclick="goStep2()">
        <span class="btn-label">CONTINUAR</span>
      </button>
    </div>

    <!-- Step 2: Horários -->
    <div id="step-2" style="display:none;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <span style="background:var(--verde-acao);color:#000;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;">2</span>
        <span style="font-size:14px;font-weight:700;">Horários de funcionamento</span>
        <span style="font-size:11px;color:var(--texto-muted);margin-left:auto;">Passo 2 de 3</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="field">
          <label>ABRE ÀS</label>
          <input type="time" id="shop-open" value="08:00">
        </div>
        <div class="field">
          <label>FECHA ÀS</label>
          <input type="time" id="shop-close" value="19:00">
        </div>
      </div>

      <div class="field">
        <label>DIAS QUE ABRE</label>
        <div id="days-grid" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      </div>

      <div style="display:flex;gap:10px;">
        <button class="btn btn-outline" onclick="backStep1()" style="flex:0.4;">VOLTAR</button>
        <button class="btn btn-primary" onclick="goStep3()" style="flex:0.6;">CONTINUAR</button>
      </div>
    </div>

    <!-- Step 3: Serviços -->
    <div id="step-3" style="display:none;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <span style="background:var(--verde-acao);color:#000;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;">3</span>
        <span style="font-size:14px;font-weight:700;">Seus serviços</span>
        <span style="font-size:11px;color:var(--texto-muted);margin-left:auto;">Passo 3 de 3</span>
      </div>

      <div id="services-list"></div>

      <button class="btn btn-outline" onclick="addServiceRow()" style="margin-bottom:16px;font-size:12px;">
        + ADICIONAR SERVIÇO
      </button>

      <div style="display:flex;gap:10px;">
        <button class="btn btn-outline" onclick="backStep2()" style="flex:0.4;">VOLTAR</button>
        <button class="btn btn-primary" onclick="finishOnboarding()" id="btn-finish" style="flex:0.6;">
          <span class="btn-label">FINALIZAR</span>
          <div class="spinner" style="display:none;"></div>
        </button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js?v=2"></script>
<script src="js/utils.js?v=2"></script>
<script>
// ── Verificar sessão ──────────────────────────────────────────
let currentUser = null;

const ADMIN_EMAILS = ['duam-rt@hotmail.com'];

document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session }, error: sessErr } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;

  // Admin vai pro painel, não pro onboarding
  if (ADMIN_EMAILS.includes(currentUser.email)) {
    window.location.href = 'admin.html';
    return;
  }

  // Já tem barbearia? Vai pro dashboard
  const { data: shop, error: shopErr } = await sb
    .from('barbershops')
    .select('id')
    .eq('owner_id', currentUser.id)
    .maybeSingle();
  console.log('onboarding shop:', shop, 'err:', shopErr);
  if (shop) { window.location.href = 'dashboard.html'; return; }

  // Preencher nome do user se tiver
  const nome = currentUser.user_metadata?.nome || '';
  if (nome) {
    const nameInput = document.getElementById('shop-name');
    if (!nameInput.value) nameInput.placeholder = `Ex: Studio ${nome.split(' ')[0]}`;
  }

  // BUG 11 ALTO FIX: restaurar draft do Step 1 do localStorage
  const draft = JSON.parse(localStorage.getItem('naregua_onboarding_draft') || '{}');
  if (draft.type) selectedType = draft.type;
  if (draft.name) document.getElementById('shop-name').value = draft.name;
  if (draft.city) document.getElementById('shop-city').value = draft.city;
  if (draft.phone) document.getElementById('shop-phone').value = draft.phone;

  // Dias da semana
  renderDays();
  // Tipo de negócio
  renderTypes();
  // Serviços padrão (barbearia por default)
  loadDefaultServices();

  // BUG 11 ALTO FIX: salvar draft conforme preenche Step 1
  ['shop-name', 'shop-city', 'shop-phone'].forEach(id => {
    document.getElementById(id).addEventListener('input', saveDraft);
  });
});

// ── Steps navigation ──────────────────────────────────────────
function goStep2() {
  const name = document.getElementById('shop-name').value.trim();
  const city = document.getElementById('shop-city').value.trim();
  if (!name) { showOnbMsg('Digite o nome do estabelecimento.', 'error'); return; }
  if (!city) { showOnbMsg('Digite a cidade.', 'error'); return; }
  hideOnbMsg();
  document.getElementById('step-1').style.display = 'none';
  document.getElementById('step-2').style.display = 'block';
}

function backStep1() {
  document.getElementById('step-2').style.display = 'none';
  document.getElementById('step-1').style.display = 'block';
}

function goStep3() {
  hideOnbMsg();
  document.getElementById('step-2').style.display = 'none';
  document.getElementById('step-3').style.display = 'block';
}

function backStep2() {
  document.getElementById('step-3').style.display = 'none';
  document.getElementById('step-2').style.display = 'block';
}

// ── Dias da semana ────────────────────────────────────────────
const DIAS = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
let selectedDays = [1, 2, 3, 4, 5, 6]; // seg-sab por padrão

function renderDays() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = DIAS.map((d, i) => {
    const active = selectedDays.includes(i);
    return `<button type="button" onclick="toggleDay(${i})" style="
      padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;
      font-family:inherit;cursor:pointer;transition:all .2s;
      border:1px solid ${active ? 'var(--verde-acao)' : 'var(--borda)'};
      background:${active ? 'rgba(212,168,83,0.15)' : 'transparent'};
      color:${active ? 'var(--verde-acao)' : 'var(--texto-muted)'};
    ">${d}</button>`;
  }).join('');
}

function toggleDay(i) {
  if (selectedDays.includes(i)) {
    selectedDays = selectedDays.filter(d => d !== i);
  } else {
    selectedDays.push(i);
    selectedDays.sort();
  }
  renderDays();
}

// ── Tipo de negócio ───────────────────────────────────────────
const TIPOS = [
  { key: 'barbearia', label: 'Barbearia', icon: '💈' },
  { key: 'manicure',  label: 'Manicure',  icon: '💅' },
  { key: 'salao',     label: 'Salão',     icon: '✂️' },
  { key: 'outro',     label: 'Outro',     icon: '📋' },
];

let selectedType = 'barbearia';

const DEFAULT_SERVICES = {
  barbearia: [
    { name: 'Corte', price: 25, duration_min: 30 },
    { name: 'Barba', price: 15, duration_min: 20 },
    { name: 'Corte + Barba', price: 35, duration_min: 45 },
  ],
  manicure: [
    { name: 'Manicure simples', price: 25, duration_min: 40 },
    { name: 'Pedicure', price: 30, duration_min: 50 },
    { name: 'Manicure + Pedicure', price: 50, duration_min: 80 },
    { name: 'Esmaltação em gel', price: 60, duration_min: 60 },
    { name: 'Banho de gel', price: 50, duration_min: 60 },
    { name: 'Alongamento', price: 120, duration_min: 120 },
    { name: 'Francesinha', price: 35, duration_min: 50 },
    { name: 'Spa dos pés', price: 40, duration_min: 45 },
  ],
  salao: [
    { name: 'Corte feminino', price: 40, duration_min: 45 },
    { name: 'Escova', price: 30, duration_min: 40 },
    { name: 'Progressiva', price: 120, duration_min: 120 },
    { name: 'Hidratação', price: 40, duration_min: 40 },
    { name: 'Coloração', price: 80, duration_min: 90 },
    { name: 'Manicure', price: 25, duration_min: 40 },
    { name: 'Pedicure', price: 30, duration_min: 50 },
    { name: 'Sobrancelha', price: 15, duration_min: 15 },
  ],
  outro: [],
};

function renderTypes() {
  const el = document.getElementById('type-grid');
  el.innerHTML = TIPOS.map(t =>
    `<button type="button" onclick="setType('${t.key}')" style="
      flex:1;min-width:90px;padding:12px 8px;border-radius:10px;font-size:12px;font-weight:700;
      font-family:inherit;cursor:pointer;transition:all .2s;text-align:center;
      border:1.5px solid ${selectedType === t.key ? 'var(--verde-acao)' : 'var(--borda)'};
      background:${selectedType === t.key ? 'rgba(212,168,83,0.1)' : 'transparent'};
      color:${selectedType === t.key ? 'var(--verde-acao)' : 'var(--texto-muted)'};
    "><div style="font-size:20px;margin-bottom:4px;">${t.icon}</div>${t.label}</button>`
  ).join('');
}

// BUG 11 ALTO FIX: salvar draft do Step 1 no localStorage
function saveDraft() {
  const draft = {
    type: selectedType,
    name: document.getElementById('shop-name').value,
    city: document.getElementById('shop-city').value,
    phone: document.getElementById('shop-phone').value,
  };
  localStorage.setItem('naregua_onboarding_draft', JSON.stringify(draft));
}

function setType(type) {
  selectedType = type;
  saveDraft();
  renderTypes();
  loadDefaultServices();
  // Atualizar placeholder do nome
  const placeholders = { barbearia: 'Barbearia do João', manicure: 'Studio Maria Nails', salao: 'Salão Beleza Pura', outro: 'Meu Negócio' };
  document.getElementById('shop-name').placeholder = 'Ex: ' + (placeholders[type] || 'Meu Negócio');
}

function loadDefaultServices() {
  document.getElementById('services-list').innerHTML = '';
  serviceCount = 0;
  const defaults = DEFAULT_SERVICES[selectedType] || [];
  defaults.forEach(s => addServiceRow(s.name, s.price, s.duration_min));
}

// ── Serviços ──────────────────────────────────────────────────
let serviceCount = 0;

function addServiceRow(nome, preco, duracao) {
  serviceCount++;
  const id = serviceCount;
  const list = document.getElementById('services-list');
  const row = document.createElement('div');
  row.id = `svc-${id}`;
  row.style.cssText = 'display:grid;grid-template-columns:1fr 80px 80px 32px;gap:8px;align-items:end;margin-bottom:10px;';
  row.innerHTML = `
    <div class="field" style="margin:0;">
      <label style="font-size:9px;">SERVIÇO</label>
      <input type="text" class="svc-name" placeholder="Nome" value="${nome || ''}">
    </div>
    <div class="field" style="margin:0;">
      <label style="font-size:9px;">PREÇO</label>
      <input type="number" class="svc-price" placeholder="R$" min="0" step="1" value="${preco || ''}">
    </div>
    <div class="field" style="margin:0;">
      <label style="font-size:9px;">DURAÇÃO (min)</label>
      <input type="number" class="svc-duration" placeholder="30" min="5" step="5" value="${duracao || ''}">
    </div>
    <button type="button" onclick="document.getElementById('svc-${id}').remove()" style="
      background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.2);
      border-radius:8px;color:#e74c3c;font-size:16px;cursor:pointer;
      height:42px;display:flex;align-items:center;justify-content:center;
    ">✕</button>
  `;
  list.appendChild(row);
}

// ── Finalizar onboarding ──────────────────────────────────────
async function finishOnboarding() {
  const btn = document.getElementById('btn-finish');
  // Anti double-click: desabilitar imediatamente
  if (btn.disabled) return;
  btn.disabled = true;

  const name = document.getElementById('shop-name').value.trim();
  const city = document.getElementById('shop-city').value.trim();
  const phone = document.getElementById('shop-phone').value.trim();
  const opening = document.getElementById('shop-open').value;
  const closing = document.getElementById('shop-close').value;
  let slug = gerarSlug(name);

  // BUG 9 FIX: verificar se slug já existe
  const { data: existingSlug } = await sb.from('barbershops').select('id').eq('slug', slug);
  if (existingSlug && existingSlug.length > 0) {
    slug = slug + '-' + Math.random().toString(36).slice(2, 6);
  }

  // Coletar serviços
  const svcRows = document.querySelectorAll('#services-list > div');
  const services = [];
  svcRows.forEach(row => {
    const n = row.querySelector('.svc-name').value.trim();
    const p = parseFloat(row.querySelector('.svc-price').value) || 0;
    const d = parseInt(row.querySelector('.svc-duration').value) || 30;
    if (n) services.push({ name: n, price: p, duration_min: d });
  });

  if (services.length === 0) {
    showOnbMsg('Adicione pelo menos um serviço.', 'error');
    btn.disabled = false;
    return;
  }

  // Verificar se dono já tem barbearia (evita duplicata)
  const { data: jaExiste } = await sb.from('barbershops').select('id').eq('owner_id', currentUser.id);
  if (jaExiste && jaExiste.length > 0) {
    showOnbMsg('Você já tem uma barbearia cadastrada. Redirecionando...', 'error');
    setTimeout(() => window.location.href = 'dashboard.html', 2000);
    return;
  }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';
  hideOnbMsg();

  try {
    // 1. Criar barbearia
    const { data: shop, error: errShop } = await sb
      .from('barbershops')
      .insert({
        owner_id: currentUser.id,
        name,
        slug,
        city: city.toUpperCase(),
        phone,
        business_type: selectedType,
        opening_time: opening,
        closing_time: closing,
        days_open: selectedDays
      })
      .select()
      .single();

    if (errShop) throw errShop;

    // 2. Criar barbeiro padrao (o proprio dono)
    const nomeUser = currentUser.user_metadata?.nome || name;
    await sb.from('barbers').insert({
      barbershop_id: shop.id,
      name: nomeUser.split(' ')[0],
      commission_pct: 100,
      is_owner: true,
      user_id: currentUser.id,
      working_days: selectedDays,
      working_start: opening,
      working_end: closing,
      break_start: '12:00',
      break_end: '13:00'
    });

    // 3. Criar serviços
    const svcPayload = services.map(s => ({
      barbershop_id: shop.id,
      name: s.name,
      price: s.price,
      duration_min: s.duration_min
    }));
    await sb.from('services').insert(svcPayload);

    // 4. Criar assinatura trial
    const expires = new Date();
    expires.setDate(expires.getDate() + 30);
    await sb.from('subscriptions').insert({
      barbershop_id: shop.id,
      plan: 'basico',
      expires_at: expires.toISOString()
    });

    // BUG 11 ALTO FIX: limpar draft ao finalizar
    localStorage.removeItem('naregua_onboarding_draft');

    // Mostrar link de agendamento antes de redirecionar
    const baseUrl = window.location.origin + window.location.pathname.replace('onboarding.html', '');
    const linkAgendamento = baseUrl + 'agendar.html?slug=' + slug;
    alert('Tudo pronto! Compartilhe esse link com seus clientes:\n\n' + linkAgendamento);
    navigator.clipboard.writeText(linkAgendamento).catch(() => {});

    // Redirecionar pro dashboard
    window.location.href = 'dashboard.html';

  } catch (e) {
    console.error(e);
    const msg = e.message?.includes('duplicate')
      ? 'Já existe um estabelecimento com esse nome. Tente outro.'
      : 'Erro ao cadastrar. Tente novamente.';
    showOnbMsg(msg, 'error');
    btn.disabled = false;
    btn.querySelector('.btn-label').style.display = 'inline';
    btn.querySelector('.spinner').style.display = 'none';
  }
}

// ── Feedback ──────────────────────────────────────────────────
function showOnbMsg(text, type) {
  const el = document.getElementById('onboarding-msg');
  el.textContent = text;
  el.className = `msg msg-${type} show`;
}
function hideOnbMsg() {
  document.getElementById('onboarding-msg').className = 'msg';
}
</script>
<script src="js/sw-update.js"></script>
</body>
</html>
