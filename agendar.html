<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Agendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .shop-header { text-align:center; margin-bottom:24px; }
    .shop-header h1 { font-size:20px; margin-bottom:4px; }
    .shop-header .info { font-size:12px; color:var(--texto-muted); }

    .step-indicator {
      display:flex; gap:4px; justify-content:center; margin-bottom:24px;
    }
    .step-dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--cinza-claro); transition:all .3s;
    }
    .step-dot.active { background:var(--verde-acao); width:24px; border-radius:4px; }
    .step-dot.done { background:var(--verde-medio); }

    .option-grid { display:flex; flex-direction:column; gap:8px; }

    .option-card {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; background:var(--cinza-medio); border:1.5px solid var(--borda);
      border-radius:10px; cursor:pointer; transition:all .2s;
    }
    .option-card:hover { border-color:var(--borda-hover); }
    .option-card.selected { border-color:var(--verde-acao); background:rgba(46,204,113,0.08); }
    .option-card .name { font-size:14px; font-weight:600; }
    .option-card .detail { font-size:11px; color:var(--texto-muted); margin-top:2px; }
    .option-card .price { font-size:15px; font-weight:700; color:var(--verde-acao); }

    .date-scroll {
      display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;
      scrollbar-width:none; -ms-overflow-style:none;
    }
    .date-scroll::-webkit-scrollbar { display:none; }

    .date-card {
      min-width:64px; padding:10px 8px; text-align:center;
      background:var(--cinza-medio); border:1.5px solid var(--borda);
      border-radius:10px; cursor:pointer; transition:all .2s; flex-shrink:0;
    }
    .date-card:hover { border-color:var(--borda-hover); }
    .date-card.selected { border-color:var(--verde-acao); background:rgba(46,204,113,0.08); }
    .date-card .dia-semana { font-size:10px; color:var(--texto-muted); font-weight:700; text-transform:uppercase; }
    .date-card .dia-num { font-size:20px; font-weight:800; margin:4px 0; }
    .date-card .mes { font-size:10px; color:var(--texto-muted); }
    .date-card.today .dia-semana { color:var(--verde-acao); }

    .time-grid {
      display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-top:16px;
    }
    .time-slot {
      padding:10px 0; text-align:center; font-size:13px; font-weight:600;
      background:var(--cinza-medio); border:1.5px solid var(--borda);
      border-radius:8px; cursor:pointer; transition:all .2s;
    }
    .time-slot:hover { border-color:var(--borda-hover); }
    .time-slot.selected { border-color:var(--verde-acao); background:rgba(46,204,113,0.08); color:var(--verde-acao); }
    .time-slot.disabled {
      opacity:0.3; cursor:not-allowed; pointer-events:none;
    }

    .resumo-item {
      display:flex; justify-content:space-between; padding:8px 0;
      border-bottom:1px solid var(--borda); font-size:13px;
    }
    .resumo-item:last-child { border:none; }
    .resumo-label { color:var(--texto-muted); }
    .resumo-valor { font-weight:600; }

    .success-screen { text-align:center; padding:20px 0; }
    .success-icon { font-size:48px; margin-bottom:16px; }
    .success-title { font-size:18px; font-weight:700; margin-bottom:8px; }
    .success-sub { font-size:13px; color:var(--texto-muted); margin-bottom:24px; line-height:1.5; }

    @media (max-width: 400px) {
      .time-grid { grid-template-columns:repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="page-center" style="align-items:flex-start;padding-top:40px;">
  <div class="card" style="max-width:440px;" id="main-card">

    <!-- Loading -->
    <div id="loading" style="text-align:center;padding:40px 0;">
      <div class="spinner" style="margin:0 auto 12px;width:24px;height:24px;border-color:rgba(255,255,255,0.1);border-top-color:var(--verde-acao);"></div>
      <div style="font-size:13px;color:var(--texto-muted);">Carregando...</div>
    </div>

    <!-- Erro -->
    <div id="error-screen" style="display:none;text-align:center;padding:40px 0;">
      <div style="font-size:40px;margin-bottom:12px;">😕</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Barbearia não encontrada</div>
      <div style="font-size:12px;color:var(--texto-muted);">Verifique o link e tente novamente.</div>
    </div>

    <!-- Conteúdo principal -->
    <div id="content" style="display:none;">

      <!-- Header da barbearia -->
      <div class="shop-header">
        <div class="logo" style="font-size:20px;margin-bottom:12px;">Na<span>Regua</span></div>
        <h1 id="shop-name"></h1>
        <div class="info" id="shop-info"></div>
      </div>

      <!-- Indicador de steps -->
      <div class="step-indicator" id="step-dots"></div>

      <!-- Step 1: Serviço -->
      <div id="ag-step-1">
        <h3 style="margin-bottom:12px;">Escolha o serviço</h3>
        <div class="option-grid" id="services-list"></div>
        <button class="btn btn-primary" style="margin-top:16px;" onclick="agNext(2)" id="btn-step1">CONTINUAR</button>
      </div>

      <!-- Step 2: Barbeiro -->
      <div id="ag-step-2" style="display:none;">
        <h3 style="margin-bottom:12px;">Escolha o profissional</h3>
        <div class="option-grid" id="barbers-list"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn btn-outline" onclick="agBack(1)" style="flex:0.4;">VOLTAR</button>
          <button class="btn btn-primary" onclick="agNext(3)" style="flex:0.6;">CONTINUAR</button>
        </div>
      </div>

      <!-- Step 3: Data e horário -->
      <div id="ag-step-3" style="display:none;">
        <h3 style="margin-bottom:12px;">Escolha o dia</h3>
        <div class="date-scroll" id="dates-list"></div>
        <h3 style="margin-top:16px;margin-bottom:4px;">Horário disponível</h3>
        <div style="font-size:11px;color:var(--texto-muted);margin-bottom:8px;" id="time-label"></div>
        <div class="time-grid" id="times-list"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn btn-outline" onclick="agBack(2)" style="flex:0.4;">VOLTAR</button>
          <button class="btn btn-primary" onclick="agNext(4)" style="flex:0.6;">CONTINUAR</button>
        </div>
      </div>

      <!-- Step 4: Dados do cliente -->
      <div id="ag-step-4" style="display:none;">
        <h3 style="margin-bottom:12px;">Seus dados</h3>
        <div class="field">
          <label>SEU NOME *</label>
          <input type="text" id="client-name" placeholder="Como te chamam">
        </div>
        <div class="field">
          <label>WHATSAPP *</label>
          <input type="tel" id="client-phone" placeholder="(87) 9 9999-9999">
        </div>

        <!-- Resumo -->
        <div style="background:var(--cinza-medio);border-radius:10px;padding:14px;margin-bottom:16px;">
          <div style="font-size:10px;color:var(--texto-muted);font-weight:700;letter-spacing:1px;margin-bottom:8px;">RESUMO</div>
          <div id="resumo-content"></div>
        </div>

        <div id="ag-msg" class="msg"></div>

        <div style="display:flex;gap:10px;">
          <button class="btn btn-outline" onclick="agBack(3)" style="flex:0.4;">VOLTAR</button>
          <button class="btn btn-primary" onclick="confirmarAgendamento()" id="btn-confirm" style="flex:0.6;">
            <span class="btn-label">CONFIRMAR</span>
            <div class="spinner" style="display:none;"></div>
          </button>
        </div>
      </div>

      <!-- Step 5: Sucesso -->
      <div id="ag-step-5" style="display:none;">
        <div class="success-screen">
          <div class="success-icon">✅</div>
          <div class="success-title">Agendado!</div>
          <div class="success-sub" id="success-msg"></div>
          <a id="whatsapp-link" href="#" target="_blank" class="btn btn-primary" style="text-decoration:none;margin-bottom:12px;">
            📱 CONFIRMAR VIA WHATSAPP
          </a>
          <button class="btn btn-outline" onclick="resetar()">AGENDAR OUTRO</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script>
// ── Estado ────────────────────────────────────────────────────
let shop = null;
let services = [];
let barbers = [];
let appointments = [];
let selectedService = null;
let selectedBarber = null;
let selectedDate = null;
let selectedTime = null;
let currentStep = 1;
const TOTAL_STEPS = 5;

const DIAS_SEMANA = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
const MESES = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) { showError(); return; }

  // Buscar barbearia pelo slug (acesso público)
  const { data, error } = await sb
    .from('barbershops')
    .select('*')
    .eq('slug', slug)
    .maybeSingle();

  if (error || !data) { showError(); return; }
  shop = data;

  // Buscar serviços e barbeiros
  const [svcRes, barbRes] = await Promise.all([
    sb.from('services').select('*').eq('barbershop_id', shop.id).eq('active', true).order('price'),
    sb.from('barbers').select('*').eq('barbershop_id', shop.id).eq('active', true)
  ]);

  services = svcRes.data || [];
  barbers = barbRes.data || [];

  if (!services.length) { showError(); return; }

  // Atualizar título da página
  document.title = `${shop.name} — Agendar | NaRegua`;

  // Renderizar
  document.getElementById('shop-name').textContent = shop.name;
  document.getElementById('shop-info').textContent = `${shop.city}${shop.phone ? ' · ' + shop.phone : ''}`;

  renderStepDots();
  renderServices();
  renderBarbers();
  renderDates();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
});

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'block';
}

// ── Steps ─────────────────────────────────────────────────────
function renderStepDots() {
  const dots = document.getElementById('step-dots');
  dots.innerHTML = '';
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const cls = i === currentStep ? 'active' : i < currentStep ? 'done' : '';
    dots.innerHTML += `<div class="step-dot ${cls}"></div>`;
  }
}

function showStep(n) {
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    document.getElementById(`ag-step-${i}`).style.display = i === n ? 'block' : 'none';
  }
  currentStep = n;
  renderStepDots();
}

function agNext(step) {
  if (step === 2 && !selectedService) { return; }
  if (step === 3 && !selectedBarber) { return; }
  if (step === 4 && (!selectedDate || !selectedTime)) { return; }
  if (step === 4) renderResumo();
  showStep(step);
}

function agBack(step) { showStep(step); }

// ── Serviços ──────────────────────────────────────────────────
function renderServices() {
  const el = document.getElementById('services-list');
  el.innerHTML = services.map(s => `
    <div class="option-card ${selectedService?.id === s.id ? 'selected' : ''}"
         onclick="selectService('${s.id}')">
      <div>
        <div class="name">${esc(s.name)}</div>
        <div class="detail">${s.duration_min} min</div>
      </div>
      <div class="price">${formatMoney(s.price)}</div>
    </div>
  `).join('');
}

function selectService(id) {
  selectedService = services.find(s => s.id === id);
  renderServices();
  renderTimes(); // Recalcular slots com a duração do serviço
}

// ── Barbeiros ─────────────────────────────────────────────────
function renderBarbers() {
  const el = document.getElementById('barbers-list');
  // Se só tem 1 barbeiro, seleciona automaticamente
  if (barbers.length === 1) {
    selectedBarber = barbers[0];
  }
  el.innerHTML = barbers.map(b => `
    <div class="option-card ${selectedBarber?.id === b.id ? 'selected' : ''}"
         onclick="selectBarber('${b.id}')">
      <div>
        <div class="name">${esc(b.name)}</div>
      </div>
      <div style="font-size:18px;">💈</div>
    </div>
  `).join('');
}

function selectBarber(id) {
  selectedBarber = barbers.find(b => b.id === id);
  renderBarbers();
}

// ── Datas ─────────────────────────────────────────────────────
function renderDates() {
  const el = document.getElementById('dates-list');
  const today = new Date();
  const daysOpen = shop.days_open || [1,2,3,4,5,6];
  let html = '';
  let count = 0;

  for (let i = 0; count < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const dow = d.getDay();

    // Só mostrar dias que a barbearia abre
    if (!daysOpen.includes(dow)) continue;

    const key = d.toISOString().split('T')[0];
    const isToday = i === 0;
    const sel = selectedDate === key;

    html += `<div class="date-card ${sel ? 'selected' : ''} ${isToday ? 'today' : ''}"
                  onclick="selectDate('${key}')">
      <div class="dia-semana">${isToday ? 'HOJE' : DIAS_SEMANA[dow]}</div>
      <div class="dia-num">${d.getDate()}</div>
      <div class="mes">${MESES[d.getMonth()]}</div>
    </div>`;
    count++;
  }
  el.innerHTML = html;

  // Selecionar primeiro dia automaticamente
  if (!selectedDate) {
    const firstCard = el.querySelector('.date-card');
    if (firstCard) firstCard.click();
  }
}

function selectDate(key) {
  selectedDate = key;
  renderDates();
  renderTimes();
}

// ── Horários ──────────────────────────────────────────────────
async function renderTimes() {
  const el = document.getElementById('times-list');
  const label = document.getElementById('time-label');

  if (!selectedDate || !selectedService) {
    el.innerHTML = '<div style="font-size:12px;color:var(--texto-muted);grid-column:1/-1;">Selecione um serviço e uma data.</div>';
    return;
  }

  label.textContent = `Horários para ${selectedDate.split('-').reverse().join('/')}`;

  // Buscar agendamentos do dia (pra saber quais estão ocupados)
  const dayStart = selectedDate + 'T00:00:00';
  const dayEnd = selectedDate + 'T23:59:59';
  const { data: dayAppts } = await sb
    .from('appointments')
    .select('scheduled_at,service_id,status')
    .eq('barbershop_id', shop.id)
    .gte('scheduled_at', dayStart)
    .lte('scheduled_at', dayEnd)
    .in('status', ['pending', 'confirmed']);

  appointments = dayAppts || [];

  // Gerar slots
  const [openH, openM] = (shop.opening_time || '08:00').split(':').map(Number);
  const [closeH, closeM] = (shop.closing_time || '19:00').split(':').map(Number);
  const interval = shop.interval_min || 30;
  const now = new Date();
  const isToday = selectedDate === now.toISOString().split('T')[0];

  let html = '';
  let hasSlots = false;

  for (let h = openH, m = openM; h < closeH || (h === closeH && m < closeM); ) {
    const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const slotDate = new Date(selectedDate + 'T' + timeStr + ':00');

    // Verificar se já passou (se for hoje)
    const isPast = isToday && slotDate <= now;

    // Verificar se conflita com agendamento existente
    const duration = selectedService.duration_min || 30;
    const slotEnd = new Date(slotDate.getTime() + duration * 60000);
    const isOccupied = appointments.some(a => {
      const aStart = new Date(a.scheduled_at);
      const aSvc = services.find(s => s.id === a.service_id);
      const aDur = aSvc ? aSvc.duration_min : 30;
      const aEnd = new Date(aStart.getTime() + aDur * 60000);
      return slotDate < aEnd && slotEnd > aStart;
    });

    const disabled = isPast || isOccupied;
    const sel = selectedTime === timeStr && !disabled;

    html += `<div class="time-slot ${sel ? 'selected' : ''} ${disabled ? 'disabled' : ''}"
                  onclick="${disabled ? '' : `selectTime('${timeStr}')`}">${timeStr}</div>`;

    if (!disabled) hasSlots = true;

    // Incrementar
    m += interval;
    while (m >= 60) { m -= 60; h++; }
  }

  if (!hasSlots) {
    html = '<div style="font-size:12px;color:var(--texto-muted);grid-column:1/-1;text-align:center;padding:20px 0;">Sem horários disponíveis neste dia.</div>';
  }

  el.innerHTML = html;
}

function selectTime(t) {
  selectedTime = t;
  renderTimes();
}

// ── Resumo ────────────────────────────────────────────────────
function renderResumo() {
  const dateFormatted = selectedDate.split('-').reverse().join('/');
  const el = document.getElementById('resumo-content');
  el.innerHTML = `
    <div class="resumo-item">
      <span class="resumo-label">Serviço</span>
      <span class="resumo-valor">${esc(selectedService.name)}</span>
    </div>
    <div class="resumo-item">
      <span class="resumo-label">Profissional</span>
      <span class="resumo-valor">${esc(selectedBarber.name)}</span>
    </div>
    <div class="resumo-item">
      <span class="resumo-label">Data</span>
      <span class="resumo-valor">${dateFormatted}</span>
    </div>
    <div class="resumo-item">
      <span class="resumo-label">Horário</span>
      <span class="resumo-valor">${selectedTime}</span>
    </div>
    <div class="resumo-item">
      <span class="resumo-label">Valor</span>
      <span class="resumo-valor" style="color:var(--verde-acao);">${formatMoney(selectedService.price)}</span>
    </div>
  `;
}

// ── Confirmar ─────────────────────────────────────────────────
async function confirmarAgendamento() {
  const nome = document.getElementById('client-name').value.trim();
  const phone = document.getElementById('client-phone').value.trim();
  const btn = document.getElementById('btn-confirm');
  const msgEl = document.getElementById('ag-msg');

  if (!nome) { showAgMsg('Informe seu nome.', 'error'); return; }
  if (!phone || phone.length < 10) { showAgMsg('Informe um WhatsApp válido.', 'error'); return; }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';
  msgEl.className = 'msg';

  const scheduledAt = new Date(selectedDate + 'T' + selectedTime + ':00');

  const { error } = await sb
    .from('appointments')
    .insert({
      barbershop_id: shop.id,
      barber_id: selectedBarber.id,
      service_id: selectedService.id,
      client_name: nome,
      client_phone: phone,
      scheduled_at: scheduledAt.toISOString(),
      status: 'pending'
    });

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';

  if (error) {
    console.error(error);
    showAgMsg('Erro ao agendar. Tente novamente.', 'error');
    return;
  }

  // Sucesso
  const dateFormatted = selectedDate.split('-').reverse().join('/');
  document.getElementById('success-msg').textContent =
    `${selectedService.name} com ${selectedBarber.name}\n${dateFormatted} às ${selectedTime}`;

  // Link WhatsApp pro dono da barbearia
  const shopPhone = (shop.phone || '').replace(/\D/g, '');
  const waMsg = encodeURIComponent(
    `Olá! Agendei pelo NaRegua:\n` +
    `📋 ${selectedService.name}\n` +
    `💈 ${selectedBarber.name}\n` +
    `📅 ${dateFormatted} às ${selectedTime}\n` +
    `👤 ${nome}\n` +
    `📱 ${phone}`
  );
  const waLink = document.getElementById('whatsapp-link');
  if (shopPhone) {
    waLink.href = `https://wa.me/55${shopPhone}?text=${waMsg}`;
    waLink.style.display = 'flex';
  } else {
    waLink.style.display = 'none';
  }

  showStep(5);
}

function showAgMsg(text, type) {
  const el = document.getElementById('ag-msg');
  el.textContent = text;
  el.className = `msg msg-${type} show`;
}

// ── Resetar ───────────────────────────────────────────────────
function resetar() {
  selectedService = null;
  selectedBarber = barbers.length === 1 ? barbers[0] : null;
  selectedDate = null;
  selectedTime = null;
  renderServices();
  renderBarbers();
  renderDates();
  showStep(1);
  document.getElementById('client-name').value = '';
  document.getElementById('client-phone').value = '';
}
</script>
</body>
</html>
