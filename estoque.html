<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Estoque</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NaRegua">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .est-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    .est-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0 16px; border-bottom:1px solid var(--borda); margin-bottom:16px;
    }
    .est-header h1 { font-size:18px; font-weight:700; }

    .est-stats {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px;
    }
    .est-stat {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:10px; text-align:center;
    }
    .est-stat .num { font-size:18px; font-weight:800; }
    .est-stat .lbl { font-size:8px; color:var(--texto-muted); font-weight:700; letter-spacing:0.5px; margin-top:2px; }

    .search-bar { margin-bottom:12px; }
    .search-bar input {
      width:100%; padding:10px 14px; background:var(--cinza-escuro); border:1px solid var(--borda);
      border-radius:10px; color:var(--texto-principal); font-size:14px; font-family:inherit;
      box-sizing:border-box;
    }
    .search-bar input:focus { border-color:var(--verde-acao); outline:none; }

    .cat-filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .cat-chip {
      padding:5px 12px; border-radius:16px; font-size:10px; font-weight:700;
      border:1px solid var(--borda); background:transparent; color:var(--texto-muted);
      cursor:pointer; font-family:inherit; transition:all .2s;
    }
    .cat-chip.active { border-color:var(--verde-acao); background:rgba(212,168,83,0.1); color:var(--verde-acao); }

    .prod-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:14px; margin-bottom:8px; transition:all .2s;
    }
    .prod-card:hover { border-color:var(--borda-hover); }
    .prod-card.low-stock { border-color:rgba(239,68,68,0.3); }
    .prod-top { display:flex; justify-content:space-between; align-items:center; }
    .prod-name { font-size:14px; font-weight:700; }
    .prod-cat { font-size:9px; font-weight:700; padding:2px 8px; border-radius:10px; background:rgba(255,255,255,0.06); color:var(--texto-muted); }
    .prod-info { font-size:12px; color:var(--texto-muted); margin-top:4px; }
    .prod-stock { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .prod-qty {
      font-size:20px; font-weight:800; min-width:40px; text-align:center;
    }
    .prod-qty.ok { color:var(--verde-acao); }
    .prod-qty.low { color:#ef4444; }
    .prod-qty.warn { color:#f59e0b; }
    .prod-bar {
      flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden;
    }
    .prod-bar-fill { height:100%; border-radius:3px; transition:width .3s; }
    .prod-alert {
      font-size:10px; font-weight:700; color:#ef4444; margin-top:4px;
    }
    .prod-actions { display:flex; gap:6px; margin-top:8px; }
    .prod-btn {
      padding:6px 12px; border-radius:8px; border:1px solid var(--borda);
      background:transparent; color:var(--texto-secundario); font-size:10px;
      font-weight:600; font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .prod-btn:hover { border-color:var(--verde-acao); color:var(--verde-acao); }
    .prod-btn.entrada { border-color:rgba(34,197,94,0.3); color:#22c55e; }
    .prod-btn.saida { border-color:rgba(239,68,68,0.3); color:#ef4444; }
    .prod-btn.danger:hover { border-color:#ef4444; color:#ef4444; }

    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0; z-index:1000;
      background:rgba(0,0,0,0.7); display:none; align-items:center;
      justify-content:center; padding:16px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--cinza-escuro); border:1px solid var(--borda);
      border-radius:12px; width:100%; max-width:400px; max-height:90vh;
      overflow-y:auto; padding:24px 20px;
    }
    .modal-title {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px;
    }
    .modal-title h2 { font-size:16px; }
    .modal-close {
      background:none; border:none; color:var(--texto-muted); font-size:18px;
      cursor:pointer; padding:4px 8px;
    }

    .btn-back {
      background:none; border:none; color:var(--texto-secundario); font-size:20px;
      cursor:pointer; padding:4px 8px 4px 0; font-family:inherit;
    }

    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--cinza-escuro); border-top:1px solid var(--borda);
      display:flex; justify-content:center; gap:0; padding:8px 0;
      padding-bottom:max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex:1; max-width:65px; display:flex; flex-direction:column;
      align-items:center; gap:2px; padding:6px 0;
      color:var(--texto-muted); font-size:8px; font-weight:600;
      text-decoration:none; font-family:inherit; transition:all .2s;
    }
    .nav-item.active { color:var(--verde-acao); }
    .nav-item .nav-icon { font-size:16px; }

    .empty-state { text-align:center; padding:40px 20px; color:var(--texto-muted); }

    body { padding-bottom:70px; }
  </style>
</head>
<body>

<div class="est-container">
  <div id="loading" style="text-align:center;padding:60px 0;">
    <div class="spinner" style="margin:0 auto 12px;width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--verde-acao);border-radius:50%;animation:spin .6s linear infinite;"></div>
    <div style="font-size:13px;color:var(--texto-muted);">Carregando estoque...</div>
  </div>

  <div id="content" style="display:none;">
    <div class="est-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn-back" onclick="history.back()">&#x2190;</button>
        <h1>Estoque</h1>
      </div>
      <button style="padding:6px 14px;border-radius:8px;border:none;background:var(--verde-acao);color:#000;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;" onclick="abrirModal()">+ PRODUTO</button>
    </div>

    <div class="est-stats">
      <div class="est-stat">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">PRODUTOS</div>
      </div>
      <div class="est-stat">
        <div class="num" id="stat-valor" style="color:var(--verde-acao);">0</div>
        <div class="lbl">VALOR ESTOQUE</div>
      </div>
      <div class="est-stat">
        <div class="num" id="stat-alerta" style="color:#ef4444;">0</div>
        <div class="lbl">ESTOQUE BAIXO</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Buscar produto..." oninput="filtrar()">
    </div>

    <div class="cat-filters" id="cat-filters"></div>

    <div id="prod-list"></div>
  </div>
</div>

<!-- Modal Produto -->
<div class="modal-overlay" id="modal-prod">
  <div class="modal">
    <div class="modal-title">
      <h2 id="modal-prod-title">Novo Produto</h2>
      <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
    </div>
    <div id="modal-prod-msg" class="msg"></div>
    <input type="hidden" id="prod-edit-id">
    <div class="field">
      <label>NOME *</label>
      <input type="text" id="prod-nome" placeholder="Ex: Shampoo, Cera, Pomada">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field">
        <label>PRECO VENDA</label>
        <input type="number" id="prod-preco" min="0" step="0.01" placeholder="0,00">
      </div>
      <div class="field">
        <label>CUSTO</label>
        <input type="number" id="prod-custo" min="0" step="0.01" placeholder="0,00">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field">
        <label>QTD ATUAL</label>
        <input type="number" id="prod-qty" min="0" step="1" placeholder="0">
      </div>
      <div class="field">
        <label>ESTOQUE MINIMO</label>
        <input type="number" id="prod-min" min="0" step="1" placeholder="5" value="5">
      </div>
    </div>
    <div class="field">
      <label>CATEGORIA</label>
      <select id="prod-cat" style="width:100%;padding:10px;background:var(--cinza-medio);border:1px solid var(--borda);border-radius:8px;color:var(--texto-principal);font-size:14px;font-family:inherit;">
        <option value="geral">Geral</option>
        <option value="cabelo">Cabelo</option>
        <option value="barba">Barba</option>
        <option value="skincare">Skincare</option>
        <option value="acessorios">Acessorios</option>
        <option value="higiene">Higiene</option>
        <option value="outros">Outros</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="salvarProduto()" id="btn-prod-save">
      <span class="btn-label">SALVAR</span>
      <div class="spinner" style="display:none;"></div>
    </button>
  </div>
</div>

<!-- Modal Movimentacao -->
<div class="modal-overlay" id="modal-mov">
  <div class="modal" style="max-width:340px;text-align:center;">
    <div id="mov-title" style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--texto-muted);margin-bottom:8px;"></div>
    <div id="mov-prod-name" style="font-size:15px;font-weight:700;margin-bottom:4px;"></div>
    <div id="mov-prod-qty" style="font-size:12px;color:var(--texto-muted);margin-bottom:16px;"></div>
    <div class="field">
      <label>QUANTIDADE</label>
      <input type="number" id="mov-qty" min="1" step="1" value="1" style="text-align:center;font-size:20px;font-weight:800;">
    </div>
    <div class="field">
      <label>OBSERVACAO</label>
      <input type="text" id="mov-notes" placeholder="Opcional">
    </div>
    <input type="hidden" id="mov-prod-id">
    <input type="hidden" id="mov-type">
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="fecharMov()" style="flex:0.4;">CANCELAR</button>
      <button class="btn btn-primary" onclick="salvarMov()" id="btn-mov-save" style="flex:0.6;">
        <span class="btn-label">CONFIRMAR</span>
        <div class="spinner" style="display:none;"></div>
      </button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><span class="nav-icon">&#x1F4C5;</span>AGENDA</a>
  <a class="nav-item" href="equipe.html"><span class="nav-icon">&#x1F465;</span>EQUIPE</a>
  <a class="nav-item" href="financeiro.html"><span class="nav-icon">&#x1F4B0;</span>CAIXA</a>
  <button class="nav-item active" onclick="toggleMore()" id="btn-more"><span class="nav-icon">&#x2630;</span>MAIS</button>
</div>
<div id="more-menu" style="display:none;position:fixed;bottom:56px;right:8px;background:var(--cinza-escuro);border:1px solid var(--borda);border-radius:12px;padding:8px;z-index:999;min-width:160px;">
  <a href="servicos.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--texto-secundario);text-decoration:none;font-size:12px;font-weight:600;border-radius:8px;transition:all .2s;">&#x2702;&#xFE0F; Servicos</a>
  <a href="clientes.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--texto-secundario);text-decoration:none;font-size:12px;font-weight:600;border-radius:8px;transition:all .2s;">&#x1F4CB; Clientes</a>
  <a href="estoque.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--texto-secundario);text-decoration:none;font-size:12px;font-weight:600;border-radius:8px;transition:all .2s;">&#x1F4E6; Estoque</a>
  <a href="relatorio.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--texto-secundario);text-decoration:none;font-size:12px;font-weight:600;border-radius:8px;transition:all .2s;">&#x1F4CA; Relatorio</a>
</div>
<script>
function toggleMore(){var m=document.getElementById('more-menu');m.style.display=m.style.display==='none'?'block':'none';}
document.addEventListener('click',function(e){if(!e.target.closest('#more-menu')&&!e.target.closest('#btn-more')){document.getElementById('more-menu').style.display='none';}});
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js?v=3"></script>
<script src="js/utils.js?v=3"></script>
<script>
let shop = null;
let products = [];
let currentCat = 'todos';

const ADMIN_EMAILS = ['duam-rt@hotmail.com'];
const _params = new URLSearchParams(window.location.search);
const adminViewingShop = _params.get('shop') || sessionStorage.getItem('admin_viewing_shop');
if (adminViewingShop) sessionStorage.setItem('admin_viewing_shop', adminViewingShop);
const isAdminViewing = !!adminViewingShop;
const db = isAdminViewing
  ? window.supabase.createClient('https://jsydprrcyrjjxdmzrqpz.supabase.co', _SK)
  : sb;

document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  if (ADMIN_EMAILS.includes(session.user.email) && !isAdminViewing) {
    window.location.href = 'admin.html'; return;
  }

  let shopData;
  if (isAdminViewing) {
    const { data } = await db.from('barbershops').select('*').eq('id', adminViewingShop).single();
    shopData = data;
  } else {
    const { data } = await db.from('barbershops').select('*').eq('owner_id', session.user.id).maybeSingle();
    shopData = data;
  }

  if (!shopData) { window.location.href = 'onboarding.html'; return; }
  shop = shopData;

  await loadProducts();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
});

async function loadProducts() {
  const r = await fetch(_SB_REST + '/products?barbershop_id=eq.' + shop.id + '&active=is.true&order=name.asc', {
    headers: getServiceHeaders()
  });
  products = r.ok ? await r.json() : [];
  renderStats();
  renderCatFilters();
  renderProducts();
}

function renderStats() {
  const total = products.length;
  const valor = products.reduce((s, p) => s + (p.price || 0) * (p.quantity || 0), 0);
  const alertas = products.filter(p => p.quantity <= p.min_stock).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-valor').textContent = valor > 0 ? formatMoney(valor).replace('R$ ', '') : '0';
  document.getElementById('stat-alerta').textContent = alertas;
}

function renderCatFilters() {
  const cats = ['todos', ...new Set(products.map(p => p.category || 'geral'))];
  document.getElementById('cat-filters').innerHTML = cats.map(c =>
    '<button class="cat-chip ' + (currentCat === c ? 'active' : '') + '" onclick="setCat(\'' + c + '\')">' + (c === 'todos' ? 'Todos' : c.charAt(0).toUpperCase() + c.slice(1)) + '</button>'
  ).join('');
}

function setCat(c) { currentCat = c; renderCatFilters(); renderProducts(); }

function filtrar() { renderProducts(); }

function renderProducts() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  let list = products;
  if (currentCat !== 'todos') list = list.filter(p => p.category === currentCat);
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q));

  const el = document.getElementById('prod-list');

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">&#x1F4E6;</div><div>Nenhum produto cadastrado.</div></div>';
    return;
  }

  // Alertas primeiro
  list.sort((a, b) => {
    const aLow = a.quantity <= a.min_stock ? 0 : 1;
    const bLow = b.quantity <= b.min_stock ? 0 : 1;
    return aLow - bLow || a.name.localeCompare(b.name);
  });

  el.innerHTML = list.map(p => {
    const isLow = p.quantity <= p.min_stock;
    const isWarn = p.quantity <= p.min_stock * 2 && !isLow;
    const qtyClass = isLow ? 'low' : isWarn ? 'warn' : 'ok';
    const maxBar = Math.max(p.min_stock * 3, p.quantity, 1);
    const pct = Math.min((p.quantity / maxBar) * 100, 100);
    const barColor = isLow ? '#ef4444' : isWarn ? '#f59e0b' : 'var(--verde-acao)';
    const lucro = p.price && p.cost ? formatMoney(p.price - p.cost) : '';

    return '<div class="prod-card ' + (isLow ? 'low-stock' : '') + '">'
      + '<div class="prod-top">'
        + '<div class="prod-name">' + esc(p.name) + '</div>'
        + '<span class="prod-cat">' + (p.category || 'geral') + '</span>'
      + '</div>'
      + '<div class="prod-info">'
        + 'Venda: ' + formatMoney(p.price) + (p.cost ? ' · Custo: ' + formatMoney(p.cost) : '') + (lucro ? ' · Lucro: ' + lucro : '')
      + '</div>'
      + '<div class="prod-stock">'
        + '<div class="prod-qty ' + qtyClass + '">' + p.quantity + '</div>'
        + '<div class="prod-bar"><div class="prod-bar-fill" style="width:' + pct + '%;background:' + barColor + ';"></div></div>'
        + '<div style="font-size:9px;color:var(--texto-muted);">min: ' + p.min_stock + '</div>'
      + '</div>'
      + (isLow ? '<div class="prod-alert">Estoque baixo! Comprar com antecedencia.</div>' : '')
      + '<div class="prod-actions">'
        + '<button class="prod-btn entrada" onclick="abrirMov(\'' + p.id + '\',\'entrada\')">+ ENTRADA</button>'
        + '<button class="prod-btn saida" onclick="abrirMov(\'' + p.id + '\',\'saida\')">- SAIDA</button>'
        + '<button class="prod-btn" onclick="editarProduto(\'' + p.id + '\')">EDITAR</button>'
        + '<button class="prod-btn danger" onclick="excluirProduto(\'' + p.id + '\',this)">EXCLUIR</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

// ── Modal Produto ──────────────────────────────────────
function abrirModal() {
  document.getElementById('modal-prod-title').textContent = 'Novo Produto';
  document.getElementById('prod-edit-id').value = '';
  document.getElementById('prod-nome').value = '';
  document.getElementById('prod-preco').value = '';
  document.getElementById('prod-custo').value = '';
  document.getElementById('prod-qty').value = '0';
  document.getElementById('prod-min').value = '5';
  document.getElementById('prod-cat').value = 'geral';
  document.getElementById('modal-prod-msg').className = 'msg';
  document.getElementById('modal-prod').classList.add('show');
}

function editarProduto(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-prod-title').textContent = 'Editar Produto';
  document.getElementById('prod-edit-id').value = p.id;
  document.getElementById('prod-nome').value = p.name;
  document.getElementById('prod-preco').value = p.price || '';
  document.getElementById('prod-custo').value = p.cost || '';
  document.getElementById('prod-qty').value = p.quantity || 0;
  document.getElementById('prod-min').value = p.min_stock || 5;
  document.getElementById('prod-cat').value = p.category || 'geral';
  document.getElementById('modal-prod-msg').className = 'msg';
  document.getElementById('modal-prod').classList.add('show');
}

function fecharModal() { document.getElementById('modal-prod').classList.remove('show'); }

async function salvarProduto() {
  const btn = document.getElementById('btn-prod-save');
  const editId = document.getElementById('prod-edit-id').value;
  const nome = document.getElementById('prod-nome').value.trim();
  if (!nome) { showProdMsg('Informe o nome.', 'error'); return; }

  const payload = {
    name: nome,
    price: parseFloat(document.getElementById('prod-preco').value) || 0,
    cost: parseFloat(document.getElementById('prod-custo').value) || 0,
    quantity: parseInt(document.getElementById('prod-qty').value) || 0,
    min_stock: parseInt(document.getElementById('prod-min').value) || 5,
    category: document.getElementById('prod-cat').value
  };

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  try {
    if (editId) {
      await fetch(_SB_REST + '/products?id=eq.' + editId, {
        method: 'PATCH', headers: getServiceHeaders(), body: JSON.stringify(payload)
      });
    } else {
      await fetch(_SB_REST + '/products', {
        method: 'POST', headers: getServiceHeaders(),
        body: JSON.stringify({ barbershop_id: shop.id, ...payload })
      });
    }
    fecharModal();
    await loadProducts();
  } catch (e) {
    showProdMsg('Erro ao salvar.', 'error');
  }

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';
}

function showProdMsg(text, type) {
  const el = document.getElementById('modal-prod-msg');
  el.textContent = text;
  el.className = 'msg msg-' + type + ' show';
}

async function excluirProduto(id, btn) {
  if (!btn.dataset.confirming) {
    btn.textContent = 'Certeza?';
    btn.style.color = '#ef4444';
    btn.dataset.confirming = 'true';
    setTimeout(() => { btn.textContent = 'EXCLUIR'; btn.style.color = ''; delete btn.dataset.confirming; }, 3000);
    return;
  }
  btn.textContent = '...';
  btn.disabled = true;
  await fetch(_SB_REST + '/products?id=eq.' + id, { method: 'DELETE', headers: getServiceHeaders() });
  await loadProducts();
}

// ── Modal Movimentacao ──────────────────────────────────
function abrirMov(prodId, type) {
  const p = products.find(x => x.id === prodId);
  if (!p) return;
  document.getElementById('mov-title').textContent = type === 'entrada' ? 'ENTRADA DE ESTOQUE' : 'SAIDA DE ESTOQUE';
  document.getElementById('mov-prod-name').textContent = p.name;
  document.getElementById('mov-prod-qty').textContent = 'Estoque atual: ' + p.quantity;
  document.getElementById('mov-qty').value = 1;
  document.getElementById('mov-notes').value = '';
  document.getElementById('mov-prod-id').value = prodId;
  document.getElementById('mov-type').value = type;

  const btnSave = document.getElementById('btn-mov-save');
  if (type === 'entrada') {
    btnSave.style.background = 'var(--verde-acao)';
  } else {
    btnSave.style.background = '#ef4444';
  }

  document.getElementById('modal-mov').classList.add('show');
}

function fecharMov() { document.getElementById('modal-mov').classList.remove('show'); }

async function salvarMov() {
  const btn = document.getElementById('btn-mov-save');
  const prodId = document.getElementById('mov-prod-id').value;
  const type = document.getElementById('mov-type').value;
  const qty = parseInt(document.getElementById('mov-qty').value) || 0;
  const notes = document.getElementById('mov-notes').value.trim();

  if (qty <= 0) return;

  const p = products.find(x => x.id === prodId);
  if (!p) return;

  // Verificar se saida nao ultrapassa estoque
  if (type === 'saida' && qty > p.quantity) {
    alert('Quantidade maior que o estoque disponivel (' + p.quantity + ').');
    return;
  }

  btn.disabled = true;
  btn.querySelector('.btn-label').style.display = 'none';
  btn.querySelector('.spinner').style.display = 'inline-block';

  // Registrar movimentacao
  await fetch(_SB_REST + '/stock_movements', {
    method: 'POST', headers: getServiceHeaders(),
    body: JSON.stringify({
      product_id: prodId,
      barbershop_id: shop.id,
      type: type,
      quantity: qty,
      notes: notes
    })
  });

  // Atualizar quantidade do produto
  const newQty = type === 'entrada' ? p.quantity + qty : p.quantity - qty;
  await fetch(_SB_REST + '/products?id=eq.' + prodId, {
    method: 'PATCH', headers: getServiceHeaders(),
    body: JSON.stringify({ quantity: newQty })
  });

  btn.disabled = false;
  btn.querySelector('.btn-label').style.display = 'inline';
  btn.querySelector('.spinner').style.display = 'none';

  fecharMov();
  await loadProducts();
}
</script>
