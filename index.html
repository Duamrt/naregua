<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Sua barbearia na palma da mão</title>
  <meta name="description" content="Sistema de gestão completo para barbearias. Agenda, financeiro e clientes num só lugar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-center">
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo">Na<span>Regua</span></div>
      <p>Sua barbearia na palma da mão</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-mode="login">ENTRAR</button>
      <button class="tab" data-mode="signup">CRIAR CONTA</button>
    </div>

    <!-- Mensagem de feedback -->
    <div id="auth-msg" class="msg"></div>

    <!-- Form Login -->
    <form id="form-login" autocomplete="on">
      <div class="field">
        <label for="login-email">E-MAIL</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="login-senha">SENHA</label>
        <div class="field-password">
          <input type="password" id="login-senha" placeholder="Sua senha" autocomplete="current-password" required>
          <button type="button" class="toggle-password">👁</button>
        </div>
      </div>
      <button type="submit" id="btn-login" class="btn btn-primary">
        <span class="btn-label">ENTRAR</span>
        <div class="spinner" style="display:none;"></div>
      </button>
      <div class="bottom-link">
        <a href="#" onclick="switchTab('signup');return false;">Ainda no caderninho? Crie sua conta</a>
      </div>
    </form>

    <!-- Form Signup -->
    <form id="form-signup" style="display:none;" autocomplete="on">
      <div class="field">
        <label for="signup-nome">SEU NOME</label>
        <input type="text" id="signup-nome" placeholder="Como te chamam" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="signup-email">E-MAIL</label>
        <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="signup-senha">SENHA</label>
        <div class="field-password">
          <input type="password" id="signup-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
          <button type="button" class="toggle-password">👁</button>
        </div>
      </div>
      <button type="submit" id="btn-signup" class="btn btn-primary">
        <span class="btn-label">CRIAR CONTA GRÁTIS</span>
        <div class="spinner" style="display:none;"></div>
      </button>
      <div class="bottom-link">
        <a href="#" onclick="switchTab('login');return false;">Já tem conta? Entre aqui</a>
      </div>
    </form>

  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js?v=2"></script>
</body>
</html>
