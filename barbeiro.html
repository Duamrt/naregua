<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaRegua — Minha Agenda</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NaRegua">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dash-container { max-width:480px; width:100%; margin:0 auto; padding:16px; min-height:100dvh; }

    .dash-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0 16px; border-bottom:1px solid var(--borda); margin-bottom:16px;
    }
    .dash-header .shop-name { font-size:16px; font-weight:700; }
    .dash-header .shop-city { font-size:11px; color:var(--texto-muted); }

    .barber-badge {
      font-size:9px; font-weight:700; letter-spacing:1px; padding:4px 10px;
      border-radius:20px; background:rgba(212,168,83,0.15); color:#d4a853;
    }

    .stats-row {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px;
    }
    .stat-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:10px;
      padding:12px; text-align:center;
    }
    .stat-num { font-size:20px; font-weight:800; }
    .stat-label { font-size:9px; color:var(--texto-muted); font-weight:700; letter-spacing:1px; margin-top:2px; }

    .date-nav {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px; padding:0 4px;
    }
    .date-nav-btn {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:8px;
      color:var(--texto-principal); font-size:18px; width:36px; height:36px;
      cursor:pointer; font-family:inherit; transition:all .2s;
      display:flex; align-items:center; justify-content:center;
    }
    .date-nav-btn:hover { border-color:var(--verde-acao); }
    .date-nav-label { font-size:14px; font-weight:700; }
    .date-nav-today {
      font-size:10px; color:var(--verde-acao); background:none; border:none;
      cursor:pointer; font-family:inherit; font-weight:600; margin-top:2px;
    }

    .appt-card {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:12px;
      padding:14px; margin-bottom:10px; transition:all .2s;
    }
    .appt-card:hover { border-color:var(--borda-hover); }
    .appt-time { font-size:13px; font-weight:700; color:var(--verde-acao); }
    .appt-client { font-size:14px; font-weight:700; margin-top:4px; }
    .appt-svc { font-size:12px; color:var(--texto-muted); margin-top:2px; }
    .appt-status {
      font-size:9px; font-weight:700; padding:3px 8px; border-radius:12px;
      letter-spacing:0.5px; text-transform:uppercase;
    }
    .status-pending { background:rgba(245,158,11,0.15); color:#f59e0b; }
    .status-confirmed { background:rgba(212,168,83,0.15); color:#d4a853; }
    .status-done { background:rgba(34,197,94,0.15); color:#22c55e; }
    .status-cancelled { background:rgba(239,68,68,0.15); color:#ef4444; }
    .status-no_show { background:rgba(155,89,182,0.15); color:#9b59b6; }

    .appt-actions { display:flex; gap:6px; margin-top:10px; }
    .appt-btn {
      flex:1; padding:8px 0; border-radius:8px; border:none; font-size:11px;
      font-weight:700; font-family:inherit; cursor:pointer; transition:all .2s;
      letter-spacing:0.5px;
    }
    .btn-whatsapp { background:rgba(37,211,102,0.15); color:#25d366; }
    .btn-done-appt { background:rgba(34,197,94,0.15); color:#22c55e; }
    .btn-noshow { background:rgba(155,89,182,0.15); color:#9b59b6; }

    .empty-state {
      text-align:center; padding:40px 20px; color:var(--texto-muted);
    }
    .empty-icon { font-size:40px; margin-bottom:12px; }

    .icon-btn {
      background:var(--cinza-escuro); border:1px solid var(--borda); border-radius:8px;
      color:var(--texto-secundario); width:36px; height:36px; font-size:16px;
      cursor:pointer; transition:all .2s;
      display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover { border-color:var(--verde-acao); }

    body { padding-bottom:70px; }

    .barber-logout-bar {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--cinza-escuro); border-top:1px solid var(--borda);
      display:flex; justify-content:center; align-items:center; gap:12px;
      padding:12px 0;
      padding-bottom:max(12px, env(safe-area-inset-bottom));
    }
    .barber-logout-btn {
      background:none; border:1px solid var(--borda); border-radius:8px;
      color:var(--texto-muted); font-size:12px; font-weight:700;
      font-family:inherit; cursor:pointer; padding:8px 20px;
      transition:all .2s; letter-spacing:0.5px;
    }
    .barber-logout-btn:hover { border-color:#ef4444; color:#ef4444; }
  </style>
</head>
<body>

<div class="dash-container">

  <div id="loading" style="text-align:center;padding:60px 0;">
    <div class="spinner" style="margin:0 auto 12px;width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--verde-acao);border-radius:50%;animation:spin .6s linear infinite;"></div>
    <div style="font-size:13px;color:var(--texto-muted);">Carregando sua agenda...</div>
  </div>

  <div id="content" style="display:none;">
    <div class="dash-header">
      <div>
        <div class="shop-name" id="barber-name"></div>
        <div class="shop-city" id="shop-info"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="barber-badge">BARBEIRO</span>
        <button class="icon-btn" onclick="logout()" title="Sair">&#x23FB;</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total" style="color:var(--texto-principal);">0</div>
        <div class="stat-label">AGENDADOS</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-done" style="color:var(--verde-acao);">0</div>
        <div class="stat-label">ATENDIDOS</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-revenue" style="color:var(--verde-acao);">0</div>
        <div class="stat-label">FATURADO</div>
      </div>
    </div>

    <div class="date-nav">
      <button class="date-nav-btn" onclick="changeDay(-1)">&#x2039;</button>
      <div style="text-align:center;">
        <div class="date-nav-label" id="date-label"></div>
        <button class="date-nav-today" id="btn-today" onclick="goToday()" style="display:none;">voltar pra hoje</button>
      </div>
      <button class="date-nav-btn" onclick="changeDay(1)">&#x203A;</button>
    </div>

    <div id="appt-list"></div>
  </div>

</div>

<div class="barber-logout-bar">
  <button class="barber-logout-btn" onclick="logout()">SAIR</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js?v=3"></script>
<script src="js/utils.js?v=3"></script>
<script src="js/push.js?v=1"></script>
<script>
console.log('Barbeiro dashboard v1');

let barber = null;
let shopData = null;
let services = [];
let currentDate = new Date();
const DIAS_SEMANA = ['Domingo', 'Segunda', 'Terca', 'Quarta', 'Quinta', 'Sexta', 'Sabado'];
const MESES = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  // Buscar barbeiro vinculado a este user
  const { data: barberData } = await sb
    .from('barbers')
    .select('*, barbershops(*)')
    .eq('user_id', session.user.id)
    .eq('active', true)
    .maybeSingle();

  if (!barberData) {
    alert('Sua conta de barbeiro não foi encontrada. Fale com o dono da barbearia.');
    await sb.auth.signOut();
    window.location.href = 'index.html';
    return;
  }

  barber = barberData;
  shopData = barberData.barbershops;

  // Buscar servicos da barbearia
  const { data: svcData } = await sb
    .from('services')
    .select('*')
    .eq('barbershop_id', shopData.id)
    .eq('active', true);
  services = svcData || [];

  // Preencher header
  document.getElementById('barber-name').textContent = barber.name;
  document.getElementById('shop-info').textContent = shopData.name + (shopData.city ? ' · ' + shopData.city : '');

  // Mostrar conteudo
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Push notifications
  initPush(shopData.id);

  renderDay();
  setInterval(() => renderDay(), 30000);
});

function changeDay(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  renderDay();
}

function goToday() {
  currentDate = new Date();
  renderDay();
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function renderDateLabel() {
  const d = currentDate;
  const label = document.getElementById('date-label');
  const btnToday = document.getElementById('btn-today');
  if (isToday(d)) {
    label.textContent = 'Hoje, ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    btnToday.style.display = 'none';
  } else {
    label.textContent = DIAS_SEMANA[d.getDay()] + ', ' + d.getDate() + ' de ' + MESES[d.getMonth()];
    btnToday.style.display = 'block';
  }
}

async function renderDay() {
  renderDateLabel();
  const dateStr = currentDate.getFullYear() + '-' + String(currentDate.getMonth()+1).padStart(2,'0') + '-' + String(currentDate.getDate()).padStart(2,'0');

  const { data: appts } = await sb
    .from('appointments')
    .select('*')
    .eq('barbershop_id', shopData.id)
    .eq('barber_id', barber.id)
    .gte('scheduled_at', dateStr + 'T00:00:00-03:00')
    .lte('scheduled_at', dateStr + 'T23:59:59-03:00')
    .order('scheduled_at', { ascending: true });

  const list = appts || [];

  // Stats
  const ativos = list.filter(a => !['cancelled','no_show'].includes(a.status));
  const done = list.filter(a => a.status === 'done');
  const faturamento = done.reduce((s, a) => {
    const v = Number(a.price_paid) || (() => { const svc = services.find(sv => sv.id === a.service_id); return svc ? Number(svc.price) : 0; })();
    return s + v;
  }, 0);

  document.getElementById('stat-total').textContent = ativos.length;
  document.getElementById('stat-done').textContent = done.length;
  document.getElementById('stat-revenue').textContent = faturamento > 0 ? formatMoney(faturamento).replace('R$ ', '') : '0';

  const el = document.getElementById('appt-list');

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4ED;</div><div>Nenhum agendamento' + (isToday(currentDate) ? ' pra hoje' : ' neste dia') + '.</div></div>';
    return;
  }

  el.innerHTML = list.map(a => {
    const svc = services.find(s => s.id === a.service_id);
    const hora = new Date(a.scheduled_at);
    const timeStr = hora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    const svcName = svc ? svc.name : '—';
    const svcPrice = svc ? formatMoney(svc.price) : '';
    const phone = (a.client_phone || '').replace(/\D/g, '');

    const statusMap = {
      pending: { label: 'PENDENTE', cls: 'status-pending' },
      confirmed: { label: 'CONFIRMADO', cls: 'status-confirmed' },
      done: { label: 'ATENDIDO', cls: 'status-done' },
      cancelled: { label: 'CANCELADO', cls: 'status-cancelled' },
      no_show: { label: 'FALTOU', cls: 'status-no_show' }
    };
    const st = statusMap[a.status] || statusMap.pending;

    let actions = '';
    if (a.status === 'confirmed') {
      actions = '<div class="appt-actions">';
      actions += '<button class="appt-btn btn-done-appt" onclick="marcarAtendido(\'' + esc(a.id) + '\',this)">ATENDIDO</button>';
      actions += '<button class="appt-btn btn-noshow" onclick="marcarFalta(\'' + esc(a.id) + '\',this)">FALTOU</button>';
      if (phone) actions += '<button class="appt-btn btn-whatsapp" onclick="abrirWhatsApp(\'' + esc(a.id) + '\',\'' + esc(a.client_name) + '\',\'' + esc(phone) + '\')">ZAP</button>';
      actions += '</div>';
    } else if (a.status === 'pending' && phone) {
      actions = '<div class="appt-actions"><button class="appt-btn btn-whatsapp" onclick="abrirWhatsApp(\'' + esc(a.id) + '\',\'' + esc(a.client_name) + '\',\'' + esc(phone) + '\')">ZAP</button></div>';
    }

    return '<div class="appt-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
        '<div class="appt-time">' + timeStr + '</div>' +
        '<span class="appt-status ' + st.cls + '">' + st.label + '</span>' +
      '</div>' +
      '<div class="appt-client">' + esc(a.client_name) + '</div>' +
      '<div class="appt-svc">' + esc(svcName) + ' · ' + svcPrice + '</div>' +
      (a.client_phone ? '<div class="appt-svc">&#x1F4F1; ' + esc(a.client_phone) + '</div>' : '') +
      actions +
    '</div>';
  }).join('');
}

async function marcarAtendido(id, btn) {
  if (!btn.dataset.confirming) {
    btn.textContent = 'Certeza?';
    btn.dataset.confirming = 'true';
    setTimeout(() => { btn.textContent = 'ATENDIDO'; delete btn.dataset.confirming; }, 3000);
    return;
  }
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const appt = (await sb.from('appointments').select('*, services(price)').eq('id', id).single()).data;
    const price = appt ? (Number(appt.price_paid) || Number(appt.services?.price) || 0) : 0;
    await sb.from('appointments').update({ status: 'done', price_paid: price }).eq('id', id);
  } catch (e) { console.error('Erro ao marcar atendido:', e); }
  renderDay();
}

async function marcarFalta(id, btn) {
  if (!btn.dataset.confirming) {
    btn.textContent = 'Certeza?';
    btn.dataset.confirming = 'true';
    setTimeout(() => { btn.textContent = 'FALTOU'; delete btn.dataset.confirming; }, 3000);
    return;
  }
  btn.textContent = '...';
  btn.disabled = true;
  try {
    await sb.from('appointments').update({ status: 'no_show' }).eq('id', id);
  } catch (e) { console.error('Erro ao marcar falta:', e); }
  renderDay();
}

function abrirWhatsApp(id, nome, phone) {
  const h = new Date().getHours();
  const saudacao = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
  const msg = saudacao + ', ' + nome + '! Aqui é o ' + barber.name + ' da *' + shopData.name + '*.\nSeu horário tá confirmado. Te espero!';
  window.open('https://wa.me/55' + phone + '?text=' + encodeURIComponent(msg), '_blank');
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
</script>
<script src="js/sw-update.js"></script>
</body>
</html>
